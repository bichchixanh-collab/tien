function InventoryPanel({onClose,invItems,setInvItems,gold,setGold,equip,setEquip,showNotif,setHp,setMp,onLearnBook}) {
  const [selected,setSelected]=useState(null);
  const [confirmDrop,setConfirmDrop]=useState(false);
  const rawSelected=(selected!==null&&invItems[selected]?.type!=='empty')?invItems[selected]:null;
  // Merge với ITEMS từ items.js để lấy đủ desc, atk, def, hp, mp...
  const selectedItem = rawSelected
    ? { ...(window.ITEMS?.[rawSelected.id]||{}), ...rawSelected }
    : null;
  const totalItems=invItems.filter(i=>i.type!=='empty').length;

  const removeItem=(idx,qty=1)=>{setInvItems(prev=>{const next=[...prev];const it={...next[idx]};if(it.count>qty){it.count-=qty;next[idx]=it;}else next[idx]={type:'empty',rarity:1,name:'',count:0};return next;});setSelected(null);setConfirmDrop(false);};

  const handleUse=()=>{
    if(!selectedItem) return;
    const {type,name,rarity}=selectedItem;
    // Bí kíp → mở modal học
    if(type==='book'){
      const effect=BOOK_EFFECTS[selectedItem.id];
      if(!effect){showNotif(`✗ Bí kíp ${name} chưa có hiệu ứng!`);return;}
      onLearnBook&&onLearnBook({item:selectedItem,slotIdx:selected,effect});
      return;
    }
    if((CONSUMABLE_TYPES||['pill']).includes(type)){
      if(selectedItem.hp_restore) setHp(h=>Math.min(100,h+selectedItem.hp_restore));
      if(selectedItem.mp_restore) setMp(m=>Math.min(100,m+selectedItem.mp_restore));
      showNotif(`✦ Dùng ${name}!`); removeItem(selected,1); return;
    }
    const slot=(window.ITEM_TYPE_SLOT||EQUIP_TYPE_SLOT||{})[type];
    if(slot){
      const prev=equip[slot];
      setEquip(e=>({...e,[slot]:{...selectedItem}}));
      if(prev){setInvItems(items=>{const next=[...items];const ei=next.findIndex(i=>i.type==='empty');if(ei!==-1)next[ei]={...prev,count:1};return next;});}
      removeItem(selected,1); showNotif(`⚔ Đã trang bị ${name}!`); return;
    }
    showNotif(`✗ Không thể sử dụng ${name}`);
  };

  const handleSell=()=>{
    if(!selectedItem) return;
    const price=(SELL_PRICE||{5:80000,4:25000,3:8000,2:2000,1:500})[selectedItem.rarity]||500;
    setGold(g=>g+price); removeItem(selected,1);
    showNotif(`💰 Bán ${selectedItem.name}: +${price.toLocaleString()} Linh Thạch!`);
  };

  const handleDrop=()=>{
    if(!confirmDrop){setConfirmDrop(true);return;}
    showNotif(`🗑 Đã vứt ${selectedItem.name}`); removeItem(selected,1);
  };

  const handleSort=()=>{
    const order=['sword','dao','staff','bow','helm','chest','legs','boots','belt','ring','necklace','offhand','pill','book','gem','material','empty'];
    setInvItems(prev=>{
      const real=prev.filter(i=>i.type!=='empty');
      const empties=prev.filter(i=>i.type==='empty');
      real.sort((a,b)=>b.rarity!==a.rarity?b.rarity-a.rarity:order.indexOf(a.type)-order.indexOf(b.type));
      return[...real,...empties];
    });
    setSelected(null); showNotif('🔃 Đã sắp xếp hành nang!');
  };

  // Item detail computed values
  const rarityInfo = selectedItem ? (window.ITEM_RARITY||{})[selectedItem.rarity]||{name:'Thường',color:'#AAA'} : null;
  const equippedItem = selectedItem ? (equip||{})[(window.ITEM_TYPE_SLOT||EQUIP_TYPE_SLOT||{})[selectedItem.type]] : null;
  const hasEquipStats = selectedItem && (selectedItem.atk>0||selectedItem.def>0||selectedItem.hp>0||selectedItem.mp>0);
  const sellPrice = selectedItem ? (SELL_PRICE||{5:80000,4:25000,3:8000,2:2000,1:500})[selectedItem.rarity]||500 : 0;
  const isPill = selectedItem && (CONSUMABLE_TYPES||['pill']).includes(selectedItem.type);
  const canEquip = selectedItem && !!(window.ITEM_TYPE_SLOT||EQUIP_TYPE_SLOT||{})[selectedItem.type];

  return (<div className="panel-overlay" onClick={()=>{onClose();setConfirmDrop(false);}}><div className="panel-popup" onClick={e=>e.stopPropagation()}>
    <div className="panel-svg-wrap"><PanelFrame width={300} height={510} title="Hành Nang" color="gold"/></div>
    <div className="panel-content" style={{top:38,padding:'0 12px'}}>
      {/* Header */}
      <div className="inv-header">
        <span className="inv-gold">💰 {gold.toLocaleString()}</span>
        <span className="inv-space">{totalItems}/24 ô</span>
        <button className="quest-track-btn" onClick={handleSort} style={{fontSize:8,padding:'1px 6px'}}>⇅ Sắp xếp</button>
      </div>

      {/* Grid 6×4 */}
      <div className="inv-grid" style={{gridTemplateColumns:'repeat(6,1fr)',gap:3}}>
        {invItems.map((item,i)=>{
          const rc=item.type!=='empty'?(window.ITEM_RARITY||{})[item.rarity]?.color:'rgba(200,168,75,0.1)';
          return(<div key={i}
            className={`inv-slot${selected===i?' inv-slot-sel':''}${item.type==='empty'?' inv-slot-empty':''}`}
            style={{borderColor:item.type!=='empty'?rc:undefined,boxShadow:selected===i&&item.type!=='empty'?`0 0 6px ${rc}44`:undefined}}
            onClick={()=>{setSelected(selected===i?null:i);setConfirmDrop(false);}}>
            <ItemIcon type={item.type} size={32} rarity={item.rarity} count={item.count>1?item.count:undefined}/>
          </div>);
        })}
      </div>

      {/* Detail section */}
      {selectedItem ? (
        <div style={{marginTop:5,background:'rgba(0,0,0,0.35)',border:`1px solid ${rarityInfo.color}44`,borderRadius:3,padding:'7px 8px'}}>
          {/* Row 1: icon + name/rarity/type */}
          <div style={{display:'flex',gap:8,marginBottom:5}}>
            <div style={{flexShrink:0,width:44,height:44,border:`1px solid ${rarityInfo.color}66`,borderRadius:3,display:'flex',alignItems:'center',justifyContent:'center',background:`${rarityInfo.color}11`,boxShadow:`0 0 8px ${rarityInfo.color}33`}}>
              <ItemIcon type={selectedItem.type} size={36} rarity={selectedItem.rarity}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,fontWeight:'bold',color:rarityInfo.color,lineHeight:1.3,marginBottom:1}}>{selectedItem.name}{selectedItem.count>1&&<span style={{fontSize:9,color:'#999'}}> ×{selectedItem.count}</span>}</div>
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                <span style={{fontSize:9,color:rarityInfo.color,letterSpacing:1}}>{'★'.repeat(selectedItem.rarity)}</span>
                <span style={{fontSize:8,color:rarityInfo.color,opacity:0.8}}>{rarityInfo.name}</span>
              </div>
              <div style={{fontSize:8,color:'#888',marginTop:1}}>{TYPE_LABELS[selectedItem.type]||selectedItem.type}</div>
            </div>
          </div>

          {/* Equipment stats + comparison */}
          {hasEquipStats&&(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px',margin:'4px 0',padding:'4px 6px',background:'rgba(0,0,0,0.2)',borderRadius:2}}>
              {selectedItem.atk>0&&<StatDiff label="ATK" val={selectedItem.atk} cmp={equippedItem?.atk} color="#FF8060"/>}
              {selectedItem.def>0&&<StatDiff label="DEF" val={selectedItem.def} cmp={equippedItem?.def} color="#60C0FF"/>}
              {selectedItem.hp>0&&<StatDiff label="HP"  val={selectedItem.hp}  cmp={equippedItem?.hp}  color="#FF6060"/>}
              {selectedItem.mp>0&&<StatDiff label="MP"  val={selectedItem.mp}  cmp={equippedItem?.mp}  color="#8080FF"/>}
              {equippedItem&&<div style={{gridColumn:'1/-1',fontSize:7,color:'#555',marginTop:2}}>so sánh với: {equippedItem.name}</div>}
            </div>
          )}

          {/* Pill restore info */}
          {isPill&&(
            <div style={{margin:'4px 0',padding:'3px 6px',background:'rgba(64,255,128,0.05)',border:'1px solid rgba(64,255,128,0.15)',borderRadius:2,display:'flex',gap:10}}>
              {selectedItem.hp_restore&&<span style={{fontSize:9,color:'#FF8080'}}>❤ Hồi {selectedItem.hp_restore}% HP</span>}
              {selectedItem.mp_restore&&<span style={{fontSize:9,color:'#8080FF'}}>💧 Hồi {selectedItem.mp_restore}% MP</span>}
            </div>
          )}

          {/* Description */}
          <div style={{fontSize:9,color:'#888',lineHeight:1.5,margin:'4px 0',fontStyle:'italic',borderTop:'1px solid rgba(200,168,75,0.08)',paddingTop:4}}>{selectedItem.desc||'Không có mô tả.'}</div>

          {/* Actions */}
          <div style={{display:'flex',gap:4,marginTop:5,alignItems:'center'}}>

function DialogueBox({onClose, npc, playerLevel, activeQuests, questPool, onAcceptQuest, onTurnIn}) {
  const [mode,setMode]=useState('talk');
  const [line,setLine]=useState(0);
  const [selectedQuest,setSelectedQuest]=useState(null);

  const npcData=(NPC_DATA||[]).find(n=>n.id===npc.id)||{};
  const lines=npcData.dialogue||['Đạo Hữu, có điều gì cần ta giúp đỡ?'];

  // Quest lists
  const myActiveQuests=(activeQuests||[]).filter(q=>q.npcId===npc.id);
  const myDoneQuests=myActiveQuests.filter(q=>q.done);
  const myInProgress=myActiveQuests.filter(q=>!q.done);
  const myPoolQuests=(questPool||[]).filter(q=>q.npcId===npc.id);
  const availablePool=myPoolQuests.filter(q=>q.reqLevel<=(playerLevel||1));
  const lockedPool=myPoolQuests.filter(q=>q.reqLevel>(playerLevel||1));
  const hasAnything=myActiveQuests.length>0||myPoolQuests.length>0;

  // ── MODE: talk ───────────────────────────────────────────────
  if(mode==='talk') {
    const isDone=line>=lines.length-1;
    const choices=[
      ...(myDoneQuests.length>0?[{label:`✓ Nộp nhiệm vụ (${myDoneQuests.length})`,action:()=>{ setSelectedQuest(myDoneQuests[0]); setMode('turn_in'); }}]:[]),
      ...(hasAnything?[{label:'📋 Xem nhiệm vụ',action:()=>setMode('quest_list')}]:[]),
      {label:'👋 Tạm biệt',action:onClose},
    ];
    return (<div className="dialogue-wrap"><div className="dialogue-box">
      <div className="dialogue-inner">
        <div className="dialogue-portrait"><AvatarFrame size={52} hp={100} showHp={false}/><div className="dialogue-name" style={{color:npc.color||'var(--gold)'}}>{npc.name}</div></div>
        <div className="dialogue-text-area">
          <div className="dialogue-text">{lines[line]}</div>
          {!isDone
            ?<button className="dialogue-next" onClick={()=>setLine(l=>l+1)}>▶ Tiếp theo</button>
            :<div className="dialogue-responses">{choices.map((c,i)=><button key={i} className="dialogue-response" onClick={c.action}>{c.label}</button>)}</div>}
        </div>
      </div>
      <button className="dialogue-close" onClick={onClose}>✕</button>
    </div></div>);
  }

  // ── MODE: quest_list ─────────────────────────────────────────
  if(mode==='quest_list') {
    const sections=[
      {label:'✓ Hoàn Thành — Nộp ngay',quests:myDoneQuests,cls:'q-done'},
      {label:'► Đang thực hiện',quests:myInProgress,cls:'q-active'},
      {label:'! Nhiệm vụ mới',quests:availablePool,cls:'q-available'},
      {label:'🔒 Cần cấp cao hơn',quests:lockedPool,cls:'q-locked'},
    ].filter(s=>s.quests.length>0);
    return (<div className="dialogue-wrap"><div className="dialogue-box">
      <div className="dialogue-inner" style={{flexDirection:'column',gap:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
          <button className="dlg-back" onClick={()=>setMode('talk')}>◀ Quay lại</button>
          <span style={{fontSize:10,color:'var(--gold)'}}>Nhiệm vụ — {npc.name}</span>
        </div>
        <div className="dlg-quest-list">
          {sections.map(sec=>(<div key={sec.label}>
            <div style={{fontSize:8,color:'var(--gold-dim)',padding:'3px 0 2px',borderBottom:'1px solid rgba(200,168,75,0.1)',marginBottom:3}}>{sec.label}</div>
            {sec.quests.map(q=>{
              const isLocked=sec.cls==='q-locked';
              return(<div key={q.id} className={`dlg-quest-item ${sec.cls}`} onClick={()=>{if(isLocked)return;setSelectedQuest(q);setMode(q.done?'turn_in':'quest_detail');}}>
                <div className="dlg-qrow">
                  <span className="dlg-qstate">{q.done?'✓':sec.cls==='q-available'?'!':'►'}</span>
                  <span className="dlg-qname">{q.name}</span>
                  <span className="dlg-qlevel">Lv.{q.reqLevel}</span>
                </div>
                {!q.done&&q.progress>0&&<div style={{fontSize:8,color:'#888',marginTop:2}}>{q.progress}/{q.total}</div>}
              </div>);
            })}
          </div>))}
          {sections.length===0&&<div style={{color:'#666',fontSize:10,padding:'10px 0',textAlign:'center'}}>Không có nhiệm vụ nào</div>}
        </div>
      </div>
      <button className="dialogue-close" onClick={onClose}>✕</button>
    </div></div>);
  }

  // ── MODE: quest_detail ───────────────────────────────────────
  if(mode==='quest_detail'&&selectedQuest) {
    const q=selectedQuest;
    const isAccepted=myActiveQuests.some(a=>a.id===q.id);
    return (<div className="dialogue-wrap"><div className="dialogue-box">
      <div className="dialogue-inner" style={{flexDirection:'column',gap:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
          <button className="dlg-back" onClick={()=>setMode('quest_list')}>◀ Quay lại</button>
          <span style={{fontSize:9,color:'#FF8040',border:'1px solid rgba(255,128,64,0.3)',borderRadius:2,padding:'0 3px'}}>Lv.{q.reqLevel}</span>
          <span style={{fontSize:10,color:'var(--gold)',fontWeight:'bold'}}>{q.name}</span>
        </div>
        <div className="dlg-detail-desc">{q.desc}</div>
        {q.progress>0&&<div style={{fontSize:9,color:'#888'}}>Tiến độ: {q.progress}/{q.total}</div>}
        {q.reward&&<div className="dlg-reward-box">
          <div className="dlg-reward-title">Phần thưởng</div>
          <div className="dlg-reward-row">
            <span className="dlg-reward-val" style={{color:'#FFD040'}}>+{q.reward.gold.toLocaleString()} Linh Thạch</span>
            <span className="dlg-reward-val" style={{color:'#80FFFF'}}>+{q.reward.exp.toLocaleString()} Tu Vi</span>
            <span className="dlg-reward-val" style={{color:'#3ECFA0'}}>{q.reward.items}</span>
          </div>
        </div>}
        {isAccepted
          ?<div style={{fontSize:9,color:'#888',textAlign:'center',padding:'4px'}}>Đã nhận nhiệm vụ</div>
          :<button className="dlg-accept-btn" onClick={()=>{onAcceptQuest&&onAcceptQuest(q);setMode('quest_list');}}>✦ Nhận Nhiệm Vụ</button>}
      </div>
      <button className="dialogue-close" onClick={onClose}>✕</button>
    </div></div>);
  }

  // ── MODE: turn_in ─────────────────────────────────────────────
  if(mode==='turn_in'&&selectedQuest) {
    const q=selectedQuest;
    // If multiple done quests, show list to pick
    if(!q.done||myDoneQuests.length>1&&mode==='turn_in'&&!selectedQuest.done) {
      setSelectedQuest(myDoneQuests[0]);
    }
    return (<div className="dialogue-wrap"><div className="dialogue-box">
      <div className="dialogue-inner" style={{flexDirection:'column',gap:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
          <button className="dlg-back" onClick={()=>setMode('quest_list')}>◀ Quay lại</button>
          <span style={{fontSize:10,color:'#40FF80'}}>✓ Hoàn Thành Nhiệm Vụ</span>
        </div>
        {myDoneQuests.length>1&&<div className="dlg-quest-list" style={{marginBottom:6}}>
          {myDoneQuests.map(dq=><div key={dq.id} className={`dlg-quest-item q-done`} style={{border:selectedQuest.id===dq.id?'1px solid #40FF80':undefined}} onClick={()=>setSelectedQuest(dq)}>
            <div className="dlg-qrow"><span className="dlg-qstate">✓</span><span className="dlg-qname">{dq.name}</span></div>
          </div>)}
        </div>}
        <div style={{fontSize:10,color:'var(--text-white)',lineHeight:1.6,marginBottom:4}}>
          {`"${npcData.dialogue?.[npcData.dialogue.length-1]||'Ta rất vui lòng nhận lại nhiệm vụ của Đạo Hữu!'}"`}
        </div>
        {q.reward&&<div className="dlg-reward-box">
          <div className="dlg-reward-title">Nhận phần thưởng</div>
          <div className="dlg-reward-row">
            <span className="dlg-reward-val" style={{color:'#FFD040'}}>+{q.reward.gold.toLocaleString()} Linh Thạch</span>
            <span className="dlg-reward-val" style={{color:'#80FFFF'}}>+{q.reward.exp.toLocaleString()} Tu Vi</span>
            <span className="dlg-reward-val" style={{color:'#3ECFA0'}}>{q.reward.items}</span>
          </div>
        </div>}
        <button className="dlg-turnin-btn" onClick={()=>{onTurnIn&&onTurnIn(q);if(myDoneQuests.length<=1)onClose();else{setSelectedQuest(myDoneQuests.find(d=>d.id!==q.id));}}}>⚜ Nhận Thưởng & Hoàn Thành</button>
      </div>
      <button className="dialogue-close" onClick={onClose}>✕</button>
    </div></div>);
  }

  return null;
}

function ChatBox({messages,onClose,onSend}) {
  const [inputVal,setInputVal]=useState('');
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[messages]);
  const handleSend=()=>{const t=inputVal.trim();if(!t)return;onSend(t);setInputVal('');};
  return (<div className="chat-panel">
    <div className="chat-header"><span className="chat-title">Kênh: Thế Giới</span><button className="chat-close-btn" onClick={onClose}>✕</button></div>
    <div className="chat-messages">{messages.map(m=>(<div key={m.id} className="chat-msg"><span className="chat-name" style={{color:m.color}}>[{m.name}]</span><span className="chat-text">{m.text}</span></div>))}<div ref={endRef}/></div>
    <div className="chat-input-row"><input type="text" className="chat-input-real" value={inputVal} onChange={e=>setInputVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleSend();}} placeholder="Nhập tin nhắn..." maxLength={50}/><button className="chat-send" onClick={handleSend}>Gửi</button></div>
  </div>);
}

// ─── LOOT LOG ────────────────────────────────────────────────
function LootLog({log}) {
  if(!log.length) return null;
  return (
    <div className="loot-log">
      {log.map(entry=>(
        <div key={entry.id} className={`loot-entry${entry.fading?' fading':''}`}
          style={{borderColor:(entry.entries[entry.entries.length-1]?.color||'rgba(200,168,75,0.5)')}}>
          {entry.entries.map((e,i)=>(
            <div key={i} className="loot-entry-line" style={{color:e.color}}>
              {e.text}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ─── APP CHÍNH ───────────────────────────────────────────────
function App() {
  const [showChar,setShowChar]=useState(false);
  const [showInv,setShowInv]=useState(false);
  const [showSkill,setShowSkill]=useState(false);
  const [showQuest,setShowQuest]=useState(false);
  const [showDialogue,setShowDialogue]=useState(false);
  const [showChat,setShowChat]=useState(false);
  const [showShop,setShowShop]=useState(false);
  const [showGuild,setShowGuild]=useState(false);
  const [showEquip,setShowEquip]=useState(false);
  const [dialogueNpc,setDialogueNpc]=useState(null);
  const [equip,setEquip]=useState(DEFAULT_EQUIP);
  const [invItems,setInvItems]=useState(()=>{
    const base = [...(INVENTORY_ITEMS||[])];
    // pad to 24 slots
    while(base.length < 24) base.push({type:'empty',rarity:1,name:'',count:0});
    return base;
  });
  const invItemsRef = useRef(invItems);
  useEffect(()=>{ invItemsRef.current = invItems; }, [invItems]);
  const [lootLog,setLootLog]=useState([]);
  const lootLogIdRef = useRef(0);
  const [gold,setGold]=useState(2480000);
  const [trackerCollapsed,setTrackerCollapsed]=useState(false);
  const [quests,setQuests]=useState(QUESTS); // backward-compat alias
  const DEMO_ACCEPTED=[1,2,9];
  const [activeQuests,setActiveQuests]=useState(()=>QUESTS.filter(q=>DEMO_ACCEPTED.includes(q.id)));
  const [questPool,setQuestPool]=useState(()=>QUESTS.filter(q=>!DEMO_ACCEPTED.includes(q.id)));
  const [playerLevel]=useState(15);
  const [skillLevels,setSkillLevels]=useState([10,8,7,6,9,5,4,3]);
  const [skillPoints,setSkillPoints]=useState(5);
  const [trackedQuest,setTrackedQuest]=useState(1);
  const [hp,setHp]=useState(82);
  const [mp,setMp]=useState(65);
  const [exp,setExp]=useState(68);
  const [bossHp,setBossHp]=useState(234500);
  const [floats,setFloats]=useState([]);
  const [skillCDs,setSkillCDs]=useState([0,0,0,0,0,0,0,0]);
  const [activeSkill,setActiveSkill]=useState(null);
  const [chatMessages,setChatMessages]=useState(INITIAL_CHAT);
  const [notifText,setNotifText]=useState(null);
  const [autoFight,setAutoFight]=useState(false);
  const [learnBookData,setLearnBookData]=useState(null);
  const floatIdRef=useRef(0);
  const chatIdRef=useRef(100);
  const skillCDsRef=useRef(skillCDs);
  useEffect(()=>{skillCDsRef.current=skillCDs;},[skillCDs]);

  const [playerPos,setPlayerPos]=useState({x:WORLD_W/2,y:WORLD_H/2+160});
  const [navTarget,setNavTarget]=useState(null);

  // NPC indicators: 'done' > 'active' > 'available'
  const questIndicators=useMemo(()=>{
    const map={};
    for(const n of (NPC_DATA||[])){
      const nAct=activeQuests.filter(q=>q.npcId===n.id);
      const nDone=nAct.filter(q=>q.done);
      const nAvail=questPool.filter(q=>q.npcId===n.id&&q.reqLevel<=playerLevel);
      if(nDone.length>0)map[n.id]='done';
      else if(nAct.length>0)map[n.id]='active';
      else if(nAvail.length>0)map[n.id]='available';
    }
    return map;
  },[activeQuests,questPool,playerLevel]);

  const showNotif=useCallback((text)=>{setNotifText(text);setTimeout(()=>setNotifText(null),3000);},[]);

  const handleMobDeath=useCallback((mob)=>{
    if(!window.rollDrops) return;
    const {items:drops, gold:goldDrop}=window.rollDrops(mob.mobType||'demon', mob.lv||1);
    if(goldDrop>0) setGold(g=>g+goldDrop);
    const inv=[...invItemsRef.current];
    const pickedUp=[];
    let bagFull=false;
    for(const drop of drops){
      if(drop.stackable){
        const idx=inv.findIndex(s=>s.id===drop.id);
        if(idx>=0){ inv[idx]={...inv[idx],count:inv[idx].count+drop.count}; pickedUp.push(drop); continue; }
      }
      const emptyIdx=inv.findIndex(s=>s.type==='empty');
      if(emptyIdx>=0){ inv[emptyIdx]={...drop}; pickedUp.push(drop); }
      else bagFull=true;
    }
    setInvItems(inv);
    // Loot log entries
    const entries=[];
    if(goldDrop>0) entries.push({text:`+${goldDrop.toLocaleString()} Linh Thạch`,color:'#FFD040'});
    for(const d of pickedUp){
      const rc=(window.ITEM_RARITY||{})[d.rarity]?.color||'#AAAAAA';
      entries.push({text:`${d.name}${d.count>1?` ×${d.count}`:''}`,color:rc});
    }
    if(entries.length>0){
      const id=++lootLogIdRef.current;
      setLootLog(prev=>[...prev.slice(-5),{id,entries,fading:false}]);
      setTimeout(()=>setLootLog(prev=>prev.map(l=>l.id===id?{...l,fading:true}:l)),3500);
      setTimeout(()=>setLootLog(prev=>prev.filter(l=>l.id!==id)),4000);
    }
    if(bagFull) showNotif('⚠ Túi đồ đã đầy! Không thể nhặt thêm.');
  },[showNotif]);

  const spawnFloat=useCallback((x,y,type='normal')=>{
    const value=type==='heal'?Math.floor(Math.random()*3000+500):Math.floor(Math.random()*8000+1000);
    const id=floatIdRef.current++;
    setFloats(f=>[...f,{id,x,y,value,type}]);
    setTimeout(()=>setFloats(f=>f.filter(ft=>ft.id!==id)),1800);
  },[]);

  const triggerSkill=useCallback((i)=>{
    setActiveSkill(i);
    setTimeout(()=>setActiveSkill(null),300);
    const cdTime=SKILLS[i].baseCd;
    if(cdTime>0){
      setSkillCDs(cds=>{const n=[...cds];n[i]=1;return n;});
      const steps=60;let elapsed=0;
      const iv=setInterval(()=>{elapsed++;setSkillCDs(cds=>{const n=[...cds];n[i]=Math.max(0,1-elapsed/steps);return n;});if(elapsed>=steps)clearInterval(iv);},(cdTime*1000)/steps);
    }
    showNotif(`Dùng kỹ năng: ${SKILLS[i].name}`);
  },[showNotif]);

  const handleSkillClick=useCallback((i)=>{if(skillCDs[i]>0)return;triggerSkill(i);},[skillCDs,triggerSkill]);

  // HP/MP regen
  useEffect(()=>{const t=setInterval(()=>{setHp(h=>Math.min(100,h+0.4));setMp(m=>Math.min(100,m+0.8));setExp(e=>Math.min(100,e+0.08));},2000);return()=>clearInterval(t);},[]);

  // Clock
  useEffect(()=>{const update=()=>{const el=document.getElementById('game-time');if(el)el.textContent=new Date().toLocaleTimeString('vi-VN',{hour12:false});};update();const t=setInterval(update,1000);return()=>clearInterval(t);},[]);

  // Boss attacks player
  useEffect(()=>{const t=setInterval(()=>{setHp(h=>Math.max(5,h-(Math.random()*6+1)));setMp(m=>Math.max(0,m-(Math.random()*2+1)));},3500);return()=>clearInterval(t);},[]);

  // Auto chat
  useEffect(()=>{const msgs=[{name:'Kiếm Ma',text:'Một kiếm phá ma!',color:'#C880FF'},{name:'Thiên Kiếm Khách',text:'Cố lên!',color:'#80D0FF'},{name:'Lăng Tiêu Tiên',text:'Trị liệu ra, cứ xông đi!',color:'#80FF80'},{name:'Hệ Thống',text:'Nguyên Soái vào trạng thái điên cuồng!',color:'#FF4040'},{name:'Thanh Vân Tử',text:'Đừng sợ, tiếp tục!',color:'#FFD060'}];let idx=0;const t=setInterval(()=>{const m=msgs[idx++%msgs.length];const id=chatIdRef.current++;setChatMessages(prev=>[...prev.slice(-8),{...m,id}]);},4000);return()=>clearInterval(t);},[]);

  // Auto-fight skills
  useEffect(()=>{if(!autoFight)return;const t=setInterval(()=>{const currentCDs=skillCDsRef.current;const available=SKILLS.map((_,i)=>i).filter(i=>currentCDs[i]===0);if(available.length===0)return;const idx=available[Math.floor(Math.random()*available.length)];triggerSkill(idx);},1500);return()=>clearInterval(t);},[autoFight,triggerSkill]);

  const handleSendChat=useCallback((text)=>{const id=chatIdRef.current++;setChatMessages(prev=>[...prev.slice(-8),{id,name:'Thanh Vân Tử',text,color:'#FFD060'}]);},[]);

  const handleNpcClick=useCallback((npc)=>{
    if(npc.type==='npc'){
      setDialogueNpc(npc);
      setShowDialogue(true);
    }
  },[]);

  const sysBtns=[
    {label:'Nhân Vật',icon:'👤',action:()=>setShowChar(true)},
    {label:'Trang Bị',icon:'⚔️',action:()=>setShowEquip(true)},
    {label:'Hành Nang',icon:'🎒',action:()=>setShowInv(true)},
    {label:'Kỹ Năng',icon:'✨',action:()=>setShowSkill(true)},
    {label:'Nhiệm Vụ',icon:'📋',action:()=>setShowQuest(true)},
    {label:'Cửa Hàng',icon:'🏪',action:()=>setShowShop(true)},
    {label:'Bang Phái',icon:'⚜',action:()=>setShowGuild(true)},
  ];

  return (
    <div className="game-root">
      <div className="game-bg"><div className="bg-layer-sky"/></div>
      <div className="cloud-deco cloud-1"><CloudDecoration width={200} color="#8090C0"/></div>
      <div className="cloud-deco cloud-2"><CloudDecoration width={160} color="#9090B0"/></div>
      <div className="cloud-deco cloud-3"><CloudDecoration width={120} color="#7080A0"/></div>

      {notifText&&<div className="sys-notif"><span className="notif-icon">⚡</span>{notifText}</div>}

      {/* HUD top */}
      <div className="hud-top">
        <div className="hud-player-block">
          <div className="hud-avatar" onClick={()=>setShowChar(true)}><AvatarFrame size={54} hp={hp} showHp={true}/></div>
          <div className="hud-bars">
            {[{label:'Khí',cls:'hp-icon',val:hp,type:'hp'},{label:'Linh',cls:'mp-icon',val:mp,type:'mp'},{label:'Ngộ',cls:'exp-icon',val:exp,type:'exp'}].map(b=>(
              <div key={b.label} className="hud-bar-row">
                <span className={`hud-bar-icon ${b.cls}`}>{b.label}</span>
                <StatBar width={120} value={b.val} max={100} type={b.type}/>
                <span className="hud-bar-num">{Math.round(b.val)}%</span>
              </div>
            ))}
          </div>
        </div>
        <div className="hud-target">
          <div className="target-label">Mục tiêu: Nguyên Soái Ma Tộc</div>
          <StatBar width={100} value={bossHp} max={234500} type="boss"/>
          <div className="target-hp-num">{bossHp.toLocaleString()}</div>
        </div>
        <div className="hud-minimap">
          <MinimapFrame size={104} playerX={playerPos.x} playerY={playerPos.y} worldW={WORLD_W} worldH={WORLD_H}/>
          <div className="minimap-zone">Thanh Vân Sơn</div>
        </div>
      </div>

      {/* Boss bar */}
      <div className="boss-bar-area">
        <BossHPBar hp={bossHp} maxHp={234500} name="Nguyên Soái Ma Tộc · Huyết Sát"/>
      </div>

      {/* ═══ GAME WORLD — Top-down canvas ═══ */}
      <div className="game-world">
        <TopDownMap
          bossHp={bossHp}
          setBossHp={setBossHp}
          floats={floats}
          setFloats={setFloats}
          spawnFloat={spawnFloat}
          onNpcClick={handleNpcClick}
          showNotif={showNotif}
          autoFight={autoFight}
          navTarget={navTarget}
          onNavConsumed={()=>setNavTarget(null)}
          questIndicators={questIndicators}
          onMobDeath={handleMobDeath}
        />

        {/* Loot log */}
        <LootLog log={lootLog}/>
        <div className="quest-tracker">
          <div className="tracker-title" style={{position:'relative'}}>
            <button className="tracker-toggle" onClick={()=>setTrackerCollapsed(c=>!c)}>{trackerCollapsed?'▶':'▼'}</button>
            <Ornament width={120} height={12} color={COLORS.gold}/>
            <div className="tracker-head">Theo Dõi Nhiệm Vụ</div>
            <Ornament width={120} height={12} color={COLORS.gold}/>
          </div>
          <div className={`tracker-body${trackerCollapsed?' collapsed':''}`} style={{maxHeight:200}}>
            {activeQuests.map(q=>{
              const farm=QUEST_FARM_ZONES[q.id];
              const npc=NPC_COORDS[q.npcId];
              return (<div key={q.id} className="tracker-quest" style={{opacity:trackedQuest===q.id?1:0.6}}>
                <div className="tracker-qname"><span className={q.done?'tq-done':'tq-active'}>{q.done?'✓':'►'}</span>{trackedQuest===q.id&&<span style={{color:'#40FF80',fontSize:7}}>★</span>}<span style={{fontSize:7,color:'#FF8040',border:'1px solid rgba(255,128,64,0.3)',borderRadius:2,padding:'0 2px',flexShrink:0}}>Lv{q.reqLevel}</span>{q.name}</div>
                {!q.done&&farm&&<span className="tracker-nav-link" onClick={()=>{setNavTarget({x:farm.x,y:farm.y});showNotif(`🧭 Đang đến: ${farm.desc}`);}}>📍 {farm.desc}</span>}
                {q.done&&npc&&<span className="tracker-nav-npc" onClick={()=>{setNavTarget({x:npc.x,y:npc.y});showNotif(`🧭 Về nộp NV cho ${npc.name}...`);}}>↩ Về nộp NV cho {npc.name}</span>}
                <div className="tracker-prog">{q.progress}/{q.total}</div>
              </div>);
            })}
          </div>
        </div>

        {/* System menu */}
        <div className="sys-menu">
          {sysBtns.map((btn,i)=>(<button key={i} className="sys-btn" onClick={btn.action}><span className="sys-icon">{btn.icon}</span><span className="sys-label">{btn.label}</span></button>))}
        </div>

        {/* Chat */}
        {showChat?(
          <ChatBox messages={chatMessages} onClose={()=>setShowChat(false)} onSend={handleSendChat}/>
        ):(
          <div className="chat-bubble" onClick={()=>setShowChat(true)} style={{bottom:94}}>
            <div className="chat-last-msg">
              <span className="chat-name" style={{color:chatMessages[chatMessages.length-1]?.color}}>[{chatMessages[chatMessages.length-1]?.name}]</span>
              <span className="chat-text-snip">{chatMessages[chatMessages.length-1]?.text}</span>
            </div>
          </div>
        )}
      </div>

      {/* Skill bar */}
      <div className="skill-bar-wrap">
        <div className="skill-bar-bg"/>
        <div className="skill-bar">
          <div className="skill-aux-btns">
            <button className="aux-btn" onClick={()=>{spawnFloat(60,80,'heal');setHp(h=>Math.min(100,h+20));setMp(m=>Math.max(0,m-30));showNotif('Dùng Đại Hoàn Đan, hồi phục khí huyết');}}>
              <span>Khí</span><span className="aux-label">Hồi Máu</span>
            </button>
            <button className="aux-btn aux-blue" onClick={()=>{setMp(m=>Math.min(100,m+40));showNotif('Dùng Hồi Linh Đan, hồi phục linh lực');}}>
              <span>Linh</span><span className="aux-label">Hồi Linh</span>
            </button>
          </div>
          <div className="skill-slots">
            {SKILLS.map((sk,i)=>(<div key={i} className={`skill-slot ${activeSkill===i?'skill-slot-active':''}`} onClick={()=>handleSkillClick(i)}>
              <SkillButton size={38} cooldown={skillCDs[i]} baseCd={sk.baseCd||1} keyLabel={sk.key} active={activeSkill===i} icon={<SkillIcon type={sk.type} size={22}/>}/>
              <div className="skill-name-label">{sk.name}</div>
            </div>))}
          </div>
          <div className="auto-attack-wrap">
            <button className="auto-btn" onClick={()=>showNotif('Hãy click vào NPC trên bản đồ để nói chuyện!')}><span className="auto-icon">💬</span><span className="auto-label">Đối Thoại</span></button>
            <button className={`auto-btn auto-red ${autoFight?'auto-active':''}`} onClick={()=>{setAutoFight(f=>!f);showNotif(autoFight?'Tự động chiến đấu đã TẮT':'Tự động chiến đấu đã BẬT');}}>
              <span className="auto-icon">⚔</span><span className="auto-label">{autoFight?'Dừng':'Tự Động'}</span>
            </button>
          </div>
        </div>
        <div className="bar-ornament"><Ornament width={340} height={10} color={COLORS.gold}/></div>
      </div>

      {/* Info bar */}
      <div className="hud-info-bar">
        <span className="info-server">Khu Bích Lạc-1</span><span className="info-sep">·</span>
        <span className="info-zone">Thanh Vân Sơn</span><span className="info-sep">·</span>
        <span className="info-time" id="game-time">00:00:00</span><span className="info-sep">·</span>
        <span className="info-fps">60 FPS</span>
      </div>

      {showChar&&<CharacterPanel onClose={()=>setShowChar(false)} onEquip={()=>setShowEquip(true)}/>}
      {showInv&&<InventoryPanel onClose={()=>setShowInv(false)} invItems={invItems} setInvItems={setInvItems} gold={gold} setGold={setGold} equip={equip} setEquip={setEquip} showNotif={showNotif} setHp={setHp} setMp={setMp}
        onLearnBook={({item,slotIdx,effect})=>{setLearnBookData({item,slotIdx,effect});setShowInv(false);}}
      />}
      {showSkill&&<SkillPanel onClose={()=>setShowSkill(false)} skillLevels={skillLevels} setSkillLevels={setSkillLevels} skillPoints={skillPoints} setSkillPoints={setSkillPoints} showNotif={showNotif}/>}
      {showQuest&&<QuestPanel onClose={()=>setShowQuest(false)} quests={activeQuests} setQuests={setActiveQuests} gold={gold} setGold={setGold} showNotif={showNotif} trackedQuest={trackedQuest} setTrackedQuest={setTrackedQuest} onNavigate={(x,y)=>setNavTarget({x,y})}/>}
      {showShop&&<ShopPanel onClose={()=>setShowShop(false)} showNotif={showNotif} gold={gold} setGold={setGold}/>}
      {showGuild&&<GuildPanel onClose={()=>setShowGuild(false)} gold={gold} setGold={setGold} showNotif={showNotif}/>}
      {showEquip&&<EquipmentPanel onClose={()=>setShowEquip(false)} equip={equip} setEquip={setEquip} showNotif={showNotif}/>}
      {learnBookData&&<BookLearnModal
        book={learnBookData.item}
        effect={learnBookData.effect}
        onClose={()=>setLearnBookData(null)}
        onConfirm={()=>{
          const {slotIdx,effect}=learnBookData;
          if(effect.type==='skillpoint'){
            setSkillPoints(p=>p+effect.amount);
            showNotif(`📖 Học xong! +${effect.amount} Điểm Ngộ Đạo`);
          } else if(effect.type==='skill'&&effect.skillIdx!=null){
            setSkillLevels(prev=>{
              const n=[...prev];
              n[effect.skillIdx]=Math.min(10,(n[effect.skillIdx]||0)+effect.amount);
              return n;
            });
            showNotif(`📖 ${effect.skillName} tăng ${effect.amount} cấp!`);
          }
          // Xóa bí kíp khỏi inventory
          setInvItems(prev=>{
            const next=[...prev];
            const it={...next[slotIdx]};
            if(it.count>1){it.count-=1;next[slotIdx]=it;}
            else next[slotIdx]={type:'empty',rarity:1,name:'',count:0,id:null};
            return next;
          });
        }}
      />}
      {showDialogue&&dialogueNpc&&<DialogueBox
        onClose={()=>setShowDialogue(false)}
        npc={dialogueNpc}
        playerLevel={playerLevel}
        activeQuests={activeQuests}
        questPool={questPool}
        onAcceptQuest={(q)=>{
          setQuestPool(p=>p.filter(x=>x.id!==q.id));
          setActiveQuests(a=>[...a,{...q}]);
          showNotif(`📋 Nhận nhiệm vụ: ${q.name}`);
        }}
        onTurnIn={(q)=>{
          setActiveQuests(a=>a.filter(x=>x.id!==q.id));
          if(q.reward){setGold(g=>g+q.reward.gold);}
          showNotif(`🏆 Hoàn thành: ${q.name}! +${q.reward?.gold?.toLocaleString()||0} Linh Thạch`);
        }}
      />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>

  <script>
/* ── Landscape detection ──
   - Mobile landscape thật  → ls-active + ls-native
   - Mobile dọc (portrait)  → ls-portrait  → overlay yêu cầu xoay máy
   - Desktop (≥768px min)   → không làm gì, giữ 430px căn giữa
*/
(function () {
  var html = document.documentElement;

  function applyLayout() {
    var W = window.innerWidth;
    var H = window.innerHeight;
    var isLS     = W > H;
    var isMobile = Math.min(W, H) < 768;

    html.classList.remove('ls-active', 'ls-native', 'ls-portrait');

    if (!isMobile) return;

    if (isLS) {
      html.classList.add('ls-active', 'ls-native');
    } else {
      // Portrait trên mobile → hiện overlay, ẩn game
      html.classList.add('ls-portrait');
    }
  }

  window.addEventListener('resize', applyLayout);
  window.addEventListener('orientationchange', function () {
    setTimeout(applyLayout, 150);
  });

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyLayout);
  } else {
    applyLayout();
  }
}());
  </script>
</body>
</html>
