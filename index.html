<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tiên Hiệp Truyền Kỳ — Phiên Bản Đầy Đủ</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; image-rendering: crisp-edges; }
:root {
  --gold: #C8A84B; --gold-light: #FFE07A; --gold-dark: #7A5A10; --gold-shine: #FFF0A0;
  --jade: #3ECFA0; --red: #C02020; --red-bright: #FF4040;
  --blue: #1A3A7A; --blue-bright: #4080FF; --purple: #4A1A8A; --purple-bright: #9040FF;
  --dark-bg: #06060F; --panel-bg: #0C1030; --panel-mid: #141840; --panel-light: #1E2460;
  --text-white: #F0E8D0; --text-gold: #FFD060; --text-dim: #8A7A50;
  font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif; color: var(--text-white);
}
.game-root {
  position: fixed; inset: 0; width: 100vw; height: 100vh; overflow: hidden;
  background: var(--dark-bg); display: flex; flex-direction: column;
  max-width: 430px; margin: 0 auto; box-shadow: 0 0 80px #000;
}
.game-bg { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
.bg-layer-sky { position: absolute; inset: 0; background: linear-gradient(180deg, #020510 0%, #060820 40%, #080C28 70%, #0A1035 100%); }
@keyframes mistDrift { from { transform: translateX(-20px); opacity: 0.6; } to { transform: translateX(20px); opacity: 1; } }
.cloud-deco { position: absolute; z-index: 1; pointer-events: none; animation: cloudFloat 20s ease-in-out infinite; }
.cloud-1 { top: 15%; left: -10%; animation-duration: 24s; }
.cloud-2 { top: 25%; right: -5%; animation-duration: 18s; animation-delay: -6s; }
.cloud-3 { top: 35%; left: 20%; animation-duration: 30s; animation-delay: -12s; }
@keyframes cloudFloat { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(30px); } }
.hud-top {
  position: relative; z-index: 20; display: flex; align-items: flex-start;
  justify-content: space-between; padding: 6px 6px 0; gap: 4px; flex-shrink: 0;
}
.hud-player-block {
  display: flex; align-items: flex-start; gap: 6px;
  background: linear-gradient(135deg, rgba(12,16,48,0.92) 0%, rgba(8,10,32,0.88) 100%);
  border: 1px solid var(--gold-dark); border-radius: 3px; padding: 5px 8px 5px 5px;
  box-shadow: inset 0 0 12px rgba(0,0,0,0.6), 0 0 8px rgba(0,0,0,0.8); position: relative;
}
.hud-player-block::before { content: ''; position: absolute; top: 0; left: 0; width: 6px; height: 6px; background: var(--gold); clip-path: polygon(0 0, 100% 0, 0 100%); }
.hud-player-block::after  { content: ''; position: absolute; top: 0; right: 0; width: 6px; height: 6px; background: var(--gold); clip-path: polygon(0 0, 100% 0, 100% 100%); }
.hud-avatar { cursor: pointer; transition: filter 0.15s; flex-shrink: 0; }
.hud-avatar:hover { filter: brightness(1.2); }
.hud-bars { display: flex; flex-direction: column; gap: 3px; padding-top: 4px; }
.hud-bar-row { display: flex; align-items: center; gap: 4px; }
.hud-bar-icon { font-size: 10px; font-weight: bold; width: 14px; text-align: center; flex-shrink: 0; }
.hp-icon { color: #FF6060; } .mp-icon { color: #6090FF; } .exp-icon { color: #FFD040; }
.hud-bar-num { font-size: 9px; color: var(--text-dim); min-width: 28px; text-align: right; font-family: monospace; }
.hud-target { background: linear-gradient(135deg, rgba(48,8,8,0.9) 0%, rgba(20,4,4,0.85) 100%); border: 1px solid #7A1010; border-radius: 3px; padding: 5px 8px; min-width: 120px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 0 6px rgba(0,0,0,0.7); }
.target-label { font-size: 10px; color: #FF8080; margin-bottom: 3px; font-weight: bold; letter-spacing: 0.5px; }
.target-hp-num { font-size: 9px; color: #FF6060; text-align: right; margin-top: 2px; font-family: monospace; }
.hud-minimap { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; }
.minimap-zone { font-size: 9px; color: var(--gold); letter-spacing: 0.5px; text-shadow: 0 0 4px rgba(200,168,75,0.5); }
.boss-bar-area { position: relative; z-index: 20; display: flex; justify-content: center; padding: 4px 12px 2px; flex-shrink: 0; }
.boss-bar-wrap { width: 100%; max-width: 340px; }
.boss-bar-title { text-align: center; font-size: 11px; font-weight: bold; color: #FF6060; text-shadow: 0 0 6px rgba(255,0,0,0.5); margin-bottom: 2px; letter-spacing: 1px; }
.boss-bar-outer { position: relative; height: 16px; background: #1A0000; border: 1px solid #7A0000; border-radius: 2px; overflow: hidden; box-shadow: 0 0 8px rgba(255,0,0,0.2); }
.boss-bar-fill { height: 100%; background: linear-gradient(90deg, #FF2020 0%, #FF6020 60%, #FF2020 100%); transition: width 0.3s ease; position: relative; }
.boss-bar-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 40%; background: rgba(255,120,120,0.3); }
.boss-bar-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-family: monospace; color: white; text-shadow: 0 0 3px black, 0 0 3px black; }
.boss-bar-phase { text-align: center; font-size: 9px; color: #FF8060; margin-top: 1px; letter-spacing: 0.5px; }

/* ── GAME WORLD — canvas top-down ── */
.game-world {
  position: relative; flex: 1; z-index: 10; overflow: hidden; min-height: 0;
  cursor: crosshair;
}
.game-world-canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: block; image-rendering: pixelated;
}
/* Joystick */
.joystick-wrap {
  position: absolute; bottom: 10px; left: 10px; z-index: 30;
  width: 80px; height: 80px; pointer-events: auto;
}
.joystick-base {
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(8,10,28,0.70);
  border: 2px solid rgba(200,168,75,0.45);
  position: relative; touch-action: none; user-select: none;
}
.joystick-thumb {
  position: absolute; width: 28px; height: 28px; border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #FFE07A, #C8A84B 60%, #7A5A10);
  border: 1.5px solid rgba(255,224,122,0.7);
  box-shadow: 0 0 8px rgba(200,168,75,0.5);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  transition: box-shadow 0.1s;
}
/* Click-to-move marker */
.move-marker {
  position: absolute; width: 16px; height: 16px; z-index: 25;
  pointer-events: none;
  transform: translate(-50%, -50%);
  animation: markerFade 0.7s ease forwards;
}
@keyframes markerFade { 0%{opacity:1;transform:translate(-50%,-50%) scale(1.3)} 100%{opacity:0;transform:translate(-50%,-50%) scale(0.6)} }

/* Floating damage */
.float-wrap { position: absolute; pointer-events: none; animation: floatUp 1.8s ease-out forwards; z-index: 50; }
@keyframes floatUp { 0%{transform:translateY(0);opacity:1} 60%{transform:translateY(-50px);opacity:1} 100%{transform:translateY(-80px);opacity:0} }

/* Quest tracker */
.quest-tracker {
  position: absolute; top: 110px; left: 6px; z-index: 20;
  background: linear-gradient(135deg, rgba(8,12,32,0.88) 0%, rgba(4,6,20,0.85) 100%);
  border: 1px solid var(--gold-dark); border-radius: 3px; padding: 6px 8px;
  min-width: 145px; max-width: 170px;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.7);
}
.tracker-title { display: flex; flex-direction: column; align-items: center; gap: 2px; margin-bottom: 4px; }
.tracker-head { font-size: 11px; font-weight: bold; color: var(--gold); letter-spacing: 2px; text-shadow: 0 0 6px rgba(200,168,75,0.5); }
.tracker-quest { padding: 3px 0; border-bottom: 1px solid rgba(200,168,75,0.1); }
.tracker-quest:last-child { border-bottom: none; }
.tracker-qname { font-size: 9px; color: var(--text-white); margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
.tq-active { color: var(--gold); font-size: 8px; } .tq-done { color: #40FF80; font-size: 8px; }
.tracker-prog { font-size: 9px; color: var(--text-dim); text-align: right; font-family: monospace; }
.tracker-toggle {
  position: absolute; top: 5px; left: 5px; background: none;
  border: 1px solid rgba(200,168,75,0.3); border-radius: 2px; color: var(--gold-dark);
  font-size: 9px; width: 16px; height: 16px; cursor: pointer; line-height: 1;
  display: flex; align-items: center; justify-content: center; transition: background 0.1s, color 0.1s;
}
.tracker-toggle:hover { background: rgba(200,168,75,0.12); color: var(--gold); }
.tracker-body { overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s ease; }
.tracker-body.collapsed { max-height: 0 !important; opacity: 0; }
.tracker-nav-link { font-size: 8px; color: #60C8FF; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; padding: 1px 0; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.15s; letter-spacing: 0.3px; }
.tracker-nav-link:hover { color: #90E0FF; }
.tracker-nav-npc { font-size: 8px; color: #40FF80; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; padding: 1px 0; display: block; transition: color 0.15s; letter-spacing: 0.3px; animation: goldPulse 1.5s ease-in-out infinite; }
.tracker-nav-npc:hover { color: #80FFB0; }
.tracker-qname-link { font-size: 9px; color: var(--text-white); margin-bottom: 1px; display: flex; align-items: center; gap: 4px; cursor: pointer; transition: color 0.12s; }
.tracker-qname-link:hover { color: #60C8FF; }
.tracker-level-badge { font-size: 7px; color: #FF8040; font-family: monospace; border: 1px solid rgba(255,128,64,0.4); border-radius: 2px; padding: 0 3px; flex-shrink: 0; }

/* System menu */
.sys-menu {
  position: absolute; right: 0; top: 50%; transform: translateY(-50%); z-index: 25;
  display: flex; flex-direction: column; gap: 2px; padding: 4px 0;
  background: linear-gradient(180deg, rgba(12,16,48,0.92) 0%, rgba(8,10,32,0.88) 100%);
  border-left: 2px solid var(--gold-dark); border-top: 1px solid var(--gold-dark);
  border-bottom: 1px solid var(--gold-dark); border-radius: 4px 0 0 4px;
}
.sys-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; padding: 6px 8px; gap: 1px; transition: background 0.1s; border-bottom: 1px solid rgba(200,168,75,0.15); width: 44px; }
.sys-btn:last-child { border-bottom: none; }
.sys-btn:hover { background: rgba(200,168,75,0.1); }
.sys-btn:active { background: rgba(200,168,75,0.2); }
.sys-icon { font-size: 13px; color: var(--gold); text-shadow: 0 0 4px rgba(200,168,75,0.4); font-family: 'Noto Serif SC', serif; }
.sys-label { font-size: 8px; color: var(--text-dim); letter-spacing: 0.5px; }

/* Skill bar */
.skill-bar-wrap { position: relative; z-index: 20; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom, 0); }
.skill-bar-bg { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(6,8,24,0.95) 0%, rgba(4,4,16,0.98) 100%); border-top: 2px solid var(--gold-dark); box-shadow: 0 -4px 20px rgba(0,0,0,0.8); }
.skill-bar { position: relative; display: flex; align-items: center; justify-content: center; gap: 3px; padding: 6px 8px 4px; }
.skill-aux-btns { display: flex; flex-direction: column; gap: 4px; }
.aux-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 34px; height: 34px; background: linear-gradient(180deg, #2A2010 0%, #160E04 100%); border: 1px solid var(--gold-dark); border-radius: 3px; cursor: pointer; color: var(--gold); font-size: 12px; font-family: 'Noto Serif SC', serif; font-weight: bold; transition: filter 0.1s; gap: 1px; }
.aux-btn:hover { filter: brightness(1.3); } .aux-btn:active { filter: brightness(0.8); transform: translateY(1px); }
.aux-btn.aux-blue { background: linear-gradient(180deg, #101A3A 0%, #080C20 100%); border-color: #203060; color: #80B0FF; }
.aux-label { font-size: 7px; font-weight: normal; color: var(--text-dim); }
.skill-slots { display: flex; gap: 2px; align-items: center; }
.skill-slot { display: flex; flex-direction: column; align-items: center; gap: 1px; cursor: pointer; transition: transform 0.1s; }
.skill-slot:active { transform: scale(0.92); }
.skill-slot-active { filter: brightness(1.4); }
.skill-name-label { font-size: 8px; color: var(--text-dim); text-align: center; letter-spacing: 0.3px; max-width: 38px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.auto-attack-wrap { display: flex; flex-direction: column; gap: 4px; }
.auto-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 34px; height: 34px; background: linear-gradient(180deg, #2A1010 0%, #160808 100%); border: 1px solid #602020; border-radius: 3px; cursor: pointer; gap: 1px; transition: filter 0.1s; }
.auto-btn:hover { filter: brightness(1.2); }
.auto-icon { font-size: 13px; color: #FF8060; }
.auto-btn.auto-red .auto-icon { color: #FF4040; }
.auto-label { font-size: 7px; color: var(--text-dim); }
.bar-ornament { display: flex; justify-content: center; padding: 0 0 2px; }
.auto-btn.auto-active { background: linear-gradient(180deg,#400808 0%,#200404 100%) !important; border-color: #FF4040 !important; box-shadow: 0 0 8px rgba(255,64,64,0.4); }
@keyframes goldPulse { 0%,100%{text-shadow:0 0 6px rgba(200,168,75,0.4)} 50%{text-shadow:0 0 12px rgba(200,168,75,0.8),0 0 20px rgba(200,168,75,0.3)} }
.auto-btn.auto-active .auto-icon { color: #FF8080; animation: goldPulse 0.8s ease-in-out infinite; }

/* Info bar */
.hud-info-bar {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 21;
  display: flex; gap: 10px; background: rgba(4,4,16,0.8);
  border-bottom: 1px solid var(--gold-dark); padding: 2px 12px;
  font-size: 9px; font-family: monospace; border-radius: 0 0 6px 6px;
}
.info-server{color:var(--jade)} .info-zone{color:var(--gold)} .info-time{color:var(--text-dim)} .info-fps{color:#60FF80} .info-sep{color:rgba(200,168,75,0.3)}

/* Panels */
.panel-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; animation: fadeIn 0.15s ease; max-width: 430px; margin: 0 auto; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.panel-popup { position: relative; animation: popIn 0.2s ease; }
@keyframes popIn { from{transform:scale(0.88) translateY(12px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
.panel-svg-wrap { display: block; filter: drop-shadow(0 0 12px rgba(200,168,75,0.3)) drop-shadow(0 4px 20px rgba(0,0,0,0.8)); }
.panel-content { position: absolute; left: 0; right: 0; bottom: 12px; overflow-y: auto; max-height: calc(100% - 50px); scrollbar-width: thin; scrollbar-color: var(--gold-dark) transparent; }
.char-avatar-section { display: flex; align-items: center; gap: 10px; padding: 8px 0 6px; }
.char-name-block { flex: 1; }
.char-name { font-size: 15px; font-weight: bold; color: var(--gold); text-shadow: 0 0 6px rgba(200,168,75,0.5); animation: goldPulse 3s ease-in-out infinite; }
.char-title { font-size: 10px; color: var(--jade); margin: 2px 0; }
.char-server { font-size: 9px; color: var(--text-dim); }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 8px; padding: 4px 0; }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 4px; background: rgba(255,255,255,0.03); border-radius: 2px; border: 1px solid rgba(200,168,75,0.08); }
.stat-label { font-size: 9px; color: var(--text-dim); }
.stat-value { font-size: 10px; color: var(--gold-light); font-family: monospace; font-weight: bold; }
.char-cultivation { padding: 4px 0; display: flex; flex-direction: column; gap: 3px; }
.cult-label { font-size: 9px; color: var(--text-dim); }
.cult-num { font-size: 9px; color: var(--gold); text-align: right; font-family: monospace; }
.inv-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 0 4px; font-size: 10px; }
.inv-gold { color: var(--gold); font-weight: bold; }
.inv-space { color: var(--text-dim); font-size: 9px; font-family: monospace; }
.inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 4px 0; }
.inv-slot { background: rgba(0,0,0,0.5); border: 1px solid rgba(200,168,75,0.25); border-radius: 3px; cursor: pointer; transition: border-color 0.1s, background 0.1s; display: flex; align-items: center; justify-content: center; padding: 2px; aspect-ratio: 1; }
.inv-slot:hover { border-color: var(--gold); background: rgba(200,168,75,0.05); }
.inv-slot-sel { border-color: var(--gold-light) !important; background: rgba(200,168,75,0.12) !important; box-shadow: inset 0 0 6px rgba(200,168,75,0.2); }
.inv-slot-empty { border-style: dashed; opacity: 0.4; }
@keyframes lootSlideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
@keyframes lootFadeOut { from { opacity:1; } to { opacity:0; } }
.loot-log { position:absolute; bottom:90px; left:8px; display:flex; flex-direction:column; gap:3px; pointer-events:none; z-index:60; max-width:200px; }
.loot-entry { background:rgba(0,0,0,0.72); border-left:2px solid; border-radius:0 2px 2px 0; padding:3px 8px; animation: lootSlideIn 0.2s ease; }
.loot-entry.fading { animation: lootFadeOut 0.5s ease forwards; }
.loot-entry-line { font-size:9px; font-family:monospace; white-space:nowrap; }
.inv-detail { background: rgba(200,168,75,0.06); border: 1px solid rgba(200,168,75,0.25); border-radius: 3px; padding: 5px 8px; display: flex; align-items: center; justify-content: space-between; margin: 4px 0; }
.inv-item-name { font-size: 11px; color: var(--gold); font-weight: bold; }
.inv-actions { display: flex; gap: 4px; }
.skill-list-panel { display: flex; flex-direction: column; gap: 6px; padding: 6px 0; max-height: 280px; overflow-y: auto; }
.skill-row { display: flex; align-items: center; gap: 8px; padding: 5px 6px; background: rgba(0,0,0,0.3); border: 1px solid rgba(200,168,75,0.1); border-radius: 3px; }
.skill-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.skill-name { font-size: 11px; color: var(--text-white); font-weight: bold; }
.skill-lv { font-size: 9px; color: var(--jade); font-family: monospace; }
.skill-desc { font-size: 9px; color: var(--text-dim); }
.skill-effect { font-size: 8px; color: #FF8040; font-family: monospace; margin-top: 1px; }
.skill-pts-bar { display: flex; align-items: center; justify-content: space-between; padding: 5px 0 4px; border-bottom: 1px solid rgba(200,168,75,0.1); margin-bottom: 4px; }
.skill-pts-label { font-size: 10px; color: var(--text-dim); }
.skill-pts-val { font-size: 14px; font-weight: bold; color: var(--gold-light); font-family: monospace; text-shadow: 0 0 6px rgba(255,224,122,0.5); }
.quest-list { display: flex; flex-direction: column; gap: 8px; padding: 8px 0; }
.quest-item { background: rgba(0,0,0,0.3); border: 1px solid rgba(200,168,75,0.1); border-radius: 3px; padding: 6px 8px; position: relative; }
.quest-item.quest-done { border-color: rgba(64,255,128,0.2); opacity: 0.8; }
.quest-name { font-size: 11px; color: var(--text-white); margin-bottom: 4px; display: flex; align-items: center; gap: 5px; font-weight: bold; }
.quest-indicator { font-size: 9px; color: var(--gold); }
.quest-done .quest-indicator { color: #40FF80; }
.quest-prog { font-size: 9px; color: var(--text-dim); text-align: right; margin-top: 2px; font-family: monospace; }
.quest-complete-badge { position: absolute; top: 4px; right: 6px; font-size: 9px; color: #40FF80; background: rgba(64,255,128,0.1); border: 1px solid rgba(64,255,128,0.3); border-radius: 2px; padding: 1px 5px; font-weight: bold; }
.quest-rewards { padding: 6px 0; }
.reward-title { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
.reward-list { display: flex; align-items: center; gap: 6px; }
.reward-exp { font-size: 10px; color: var(--gold); font-family: monospace; }
.panel-btns { display: flex; gap: 6px; justify-content: center; padding: 8px 0 4px; }
.dialogue-wrap { position: fixed; bottom: 80px; left: 0; right: 0; z-index: 90; padding: 0 8px; max-width: 430px; margin: 0 auto; animation: slideUp 0.2s ease; }
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.dialogue-box { background: linear-gradient(135deg, rgba(8,10,28,0.97) 0%, rgba(4,6,20,0.96) 100%); border: 2px solid var(--gold-dark); border-radius: 4px; padding: 10px; position: relative; box-shadow: 0 -4px 20px rgba(200,168,75,0.15), 0 4px 20px rgba(0,0,0,0.8); }
.dialogue-box::before,.dialogue-box::after { content: ''; position: absolute; width: 10px; height: 10px; border: 1px solid var(--gold); }
.dialogue-box::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
.dialogue-box::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

/* ═══════════════════════════════════════════════════════════════
   LANDSCAPE / RESPONSIVE — Tiên Hiệp Truyền Kỳ
   JS gắn html.ls-active + html.ls-native (landscape thật)
           html.ls-portrait (portrait mobile → hiện rotate overlay)
   ═══════════════════════════════════════════════════════════════ */

/* ── 1. Grid container landscape ── */
html.ls-active .game-root {
  display: grid !important;
  flex-direction: unset;
  grid-template-columns: 130px 1fr 88px;
  grid-template-rows: auto 1fr;
  max-width: 100% !important;
  width: 100%; height: 100%; margin: 0;
  box-shadow: 0 0 40px #000;
}

/* ── 2. Cột trái: HUD ── */
html.ls-active .hud-top {
  grid-column: 1; grid-row: 1 / 3;
  flex-direction: column !important;
  align-items: stretch !important;
  justify-content: flex-start !important;
  width: 130px; padding: 4px !important; gap: 4px !important;
  overflow-y: auto; overflow-x: hidden;
  border-right: 1px solid var(--gold-dark);
  flex-shrink: 0;
  scrollbar-width: none;
}
html.ls-active .hud-top::-webkit-scrollbar { display: none; }

html.ls-active .hud-player-block {
  flex-direction: column !important;
  width: 100%; padding: 4px 5px !important; gap: 2px !important;
}
html.ls-active .hud-player-block::before,
html.ls-active .hud-player-block::after { display: none; }
html.ls-active .hud-bars { padding-top: 2px; }

html.ls-active .hud-target { min-width: unset !important; width: 100%; }
html.ls-active .hud-minimap { flex-direction: column; align-items: center; }

/* ── 3. Trung tâm trên: Boss bar ── */
html.ls-active .boss-bar-area {
  grid-column: 2; grid-row: 1;
  padding: 3px 10px 2px;
}

/* ── 4. Trung tâm chính: Game world ── */
html.ls-active .game-world { grid-column: 2; grid-row: 2; }

/* Quest tracker: lên cao hơn (HUD không còn phía trên nữa) */

html.ls-active .panel-overlay {
  left: 130px !important; right: 88px !important;
  max-width: none !important; margin: 0;
  /* Panel cao hơn viewport landscape → căn trên + scroll */

  overflow-y: auto !important;
  -webkit-overflow-scrolling: touch;
  padding: 6px 0 !important;
}
html.ls-active .dialogue-wrap {

        <path d="M10 44 A 26 26 0 0 1 36 18" stroke="#FFE07A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <polygon points="36,11 29,20 43,20" fill="#FFE07A"/>
        <path d="M62 28 A 26 26 0 0 1 36 54" stroke="#FFE07A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <polygon points="36,61 29,52 43,52" fill="#FFE07A"/>

  <script src="data.js"></script>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

const COLORS = {
  gold:'#C8A84B',goldLight:'#FFE07A',goldDark:'#7A5A10',goldShine:'#FFF0A0',
  jade:'#3ECFA0',jadeDark:'#1A7A58',red:'#C02020',redBright:'#FF4040',redDark:'#600010',
  blue:'#1A3A7A',blueBright:'#4080FF',blueGlow:'#80C0FF',purple:'#4A1A8A',purpleBright:'#9040FF',
  darkBg:'#08081A',panelBg:'#0C1030',panelMid:'#141840',panelLight:'#1E2460',
  textWhite:'#F0E8D0',textGold:'#FFD060',textGoldDim:'#B08020',cyan:'#00FFFF',
};

// ─── SVG Components (giữ nguyên) ─────────────────────────────
function PanelFrame({width=320,height=400,title='',color='gold'}) {
  const ac=color==='gold'?COLORS.gold:color==='jade'?COLORS.jade:color==='red'?COLORS.redBright:COLORS.blueBright;
  const ad=color==='gold'?COLORS.goldDark:color==='jade'?COLORS.jadeDark:color==='red'?COLORS.redDark:COLORS.blue;
  const b=4,co=16;
  return (<svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{imageRendering:'pixelated',display:'block'}} xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id={`panelBg_${color}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={COLORS.panelLight}/><stop offset="100%" stopColor={COLORS.panelBg}/></linearGradient>
      <linearGradient id={`borderGrad_${color}`} x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor={COLORS.goldShine}/><stop offset="40%" stopColor={ac}/><stop offset="100%" stopColor={ad}/></linearGradient>
      <filter id={`glow_${color}`}><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <rect x="4" y="4" width={width} height={height} rx="3" fill="black" opacity="0.6"/>
    <rect x="0" y="0" width={width} height={height} rx="2" fill={`url(#panelBg_${color})`}/>
    <rect x="0" y="0" width={width} height={height} rx="2" fill="none" stroke={`url(#borderGrad_${color})`} strokeWidth={b}/>
    <rect x={b+2} y={b+2} width={width-b*2-4} height={height-b*2-4} rx="1" fill="none" stroke={ad} strokeWidth="1" opacity="0.6"/>
    {[[0,0,0],[width,0,90],[width,height,180],[0,height,270]].map(([x,y,r],i)=>(
      <g key={i} transform={`rotate(${r},${x},${y})`}>
        <rect x={x} y={y} width={co} height={4} fill={ac}/>
        <rect x={x} y={y} width={4} height={co} fill={ac}/>
        <rect x={x+4} y={y+4} width={4} height={4} fill={ac} opacity="0.6"/>
      </g>
    ))}
    <line x1={co} y1={b/2} x2={width-co} y2={b/2} stroke={ac} strokeWidth="1" opacity="0.5"/>
    <line x1={co} y1={height-b/2} x2={width-co} y2={height-b/2} stroke={ac} strokeWidth="1" opacity="0.5"/>
    {title&&(<>
      <rect x={b+2} y={b+2} width={width-b*2-4} height={24} rx="1" fill={ad} opacity="0.5"/>
      <line x1={b+2} y1={b+26} x2={width-b-2} y2={b+26} stroke={ac} strokeWidth="1"/>
      <text x={width/2} y={b+18} textAnchor="middle" fill={COLORS.textGold} fontFamily="'Noto Serif SC',serif" fontSize="12" fontWeight="bold" filter={`url(#glow_${color})`}>{title}</text>
    </>)}
    {[[width/2,0],[width/2,height]].map(([x,y],i)=>(
      <g key={i} transform={`translate(${x},${y})`}>
        <rect x={-4} y={-4} width={8} height={8} fill={ac} transform="rotate(45)" opacity="0.9"/>
        <rect x={-2} y={-2} width={4} height={4} fill={COLORS.goldShine} transform="rotate(45)" opacity="0.7"/>
      </g>
    ))}
  </svg>);
}

function StatBar({width=160,value=75,max=100,type='hp'}) {
  const h=type==='exp'?8:14;
  const pct=Math.max(0,Math.min(1,value/max));
  const fillW=Math.round((width-8)*pct);
  const fs=type==='hp'?'#FF6060':type==='mp'?'#4090FF':type==='exp'?'#FFD040':'#FF2020';
  const fe=type==='hp'?'#C01010':type==='mp'?'#1040C0':type==='exp'?'#FF8000':'#A00000';
  const gc=type==='hp'?'#FF8080':type==='mp'?'#80B0FF':type==='exp'?'#FFE080':'#FF4040';
  const fc=type==='hp'?'#7A1010':type==='mp'?'#10207A':type==='exp'?'#7A5010':'#7A0000';
  const uid=`bar_${type}_${Math.random().toString(36).slice(2,6)}`;
  return (<svg width={width} height={h+4} viewBox={`0 0 ${width} ${h+4}`} style={{imageRendering:'pixelated',display:'block'}} xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id={`fill_${uid}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={fs}/><stop offset="50%" stopColor={fe}/><stop offset="100%" stopColor={fc}/></linearGradient>
      <linearGradient id={`frame_${uid}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={COLORS.gold}/><stop offset="100%" stopColor={COLORS.goldDark}/></linearGradient>
      <clipPath id={`clip_${uid}`}><rect x="4" y="2" width={width-8} height={h} rx="1"/></clipPath>
    </defs>
    <rect x="0" y="0" width={width} height={h+4} rx="2" fill={fc} stroke={`url(#frame_${uid})`} strokeWidth="2"/>
    <rect x="4" y="2" width={width-8} height={h} rx="1" fill="#000000" opacity="0.7"/>
    <rect x="4" y="2" width={fillW} height={h} rx="1" fill={`url(#fill_${uid})`} clipPath={`url(#clip_${uid})`}/>
    {fillW>4&&<rect x="4" y="2" width={fillW} height={Math.floor(h/3)} fill={gc} opacity="0.35" clipPath={`url(#clip_${uid})`}/>}
    {Array.from({length:9}).map((_,i)=>(
      <line key={i} x1={4+Math.round((width-8)*(i+1)/10)} y1={2} x2={4+Math.round((width-8)*(i+1)/10)} y2={h+2} stroke="black" strokeWidth="1" opacity="0.3"/>
    ))}
  </svg>);
}

function SkillButton({size=52,cooldown=0,baseCd=10,icon,keyLabel,active=false}) {
  const uid=`sk_${Math.random().toString(36).slice(2,6)}`;
  const cdPct=Math.max(0,Math.min(1,cooldown));
  return (<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{imageRendering:'pixelated',display:'block'}} xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id={`skBg_${uid}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={active?'#3A2A50':'#1A1030'}/><stop offset="100%" stopColor={active?'#1A0A30':'#0A0820'}/></linearGradient>
    </defs>
    <rect x="2" y="2" width={size-4} height={size-4} rx="3" fill={`url(#skBg_${uid})`}/>
    <rect x="0" y="0" width={size} height={size} rx="4" fill="none" stroke={active?COLORS.purpleBright:COLORS.gold} strokeWidth="2"/>
    <rect x="0" y="0" width="4" height="4" fill={active?COLORS.purpleBright:COLORS.gold}/>
    <rect x={size-4} y="0" width="4" height="4" fill={active?COLORS.purpleBright:COLORS.gold}/>
    <rect x="0" y={size-4} width="4" height="4" fill={active?COLORS.purpleBright:COLORS.gold}/>
    <rect x={size-4} y={size-4} width="4" height="4" fill={active?COLORS.purpleBright:COLORS.gold}/>
    {icon&&<foreignObject x="8" y="8" width={size-16} height={size-16}><div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>{icon}</div></foreignObject>}
    {cdPct>0&&(<><rect x="2" y="2" width={size-4} height={Math.round((size-4)*cdPct)} rx="3" fill="black" opacity="0.65"/><text x={size/2} y={size/2+4} textAnchor="middle" fill="white" fontFamily="monospace" fontSize="11" fontWeight="bold">{Math.ceil(cdPct*baseCd)}s</text></>)}
    {keyLabel&&!cdPct&&<text x={size-3} y={size-2} textAnchor="end" fill={COLORS.textGold} fontFamily="monospace" fontSize="8" fontWeight="bold">{keyLabel}</text>}
  </svg>);
}

function AvatarFrame({size=56,hp=85,showHp=true}) {
  const uid=`av_${Math.random().toString(36).slice(2,6)}`;
  return (<svg width={size} height={size+(showHp?10:0)} viewBox={`0 0 ${size} ${size+(showHp?10:0)}`} style={{imageRendering:'pixelated',display:'block'}} xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id={`avBg_${uid}`} x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#2A1060"/><stop offset="100%" stopColor="#0A0830"/></linearGradient>
      <clipPath id={`avClip_${uid}`}><rect x="4" y="4" width={size-8} height={size-8} rx="2"/></clipPath>
    </defs>
    <rect x="0" y="0" width={size} height={size} rx="4" fill={COLORS.gold} opacity="0.15"/>
    <rect x="2" y="2" width={size-4} height={size-4} rx="3" fill={`url(#avBg_${uid})`}/>
    <rect x="4" y="4" width={size-8} height={size-8} rx="2" fill="#1A0850" clipPath={`url(#avClip_${uid})`}/>
    <ellipse cx={size/2} cy={size*0.4} rx={size*0.18} ry={size*0.18} fill="#3A2080" clipPath={`url(#avClip_${uid})`}/>
    <ellipse cx={size/2} cy={size*0.75} rx={size*0.22} ry={size*0.25} fill="#3A2080" clipPath={`url(#avClip_${uid})`}/>
    <rect x="0" y="0" width={size} height={size} rx="4" fill="none" stroke={COLORS.gold} strokeWidth="2"/>
    <rect x="0" y="0" width="6" height="2" fill={COLORS.goldLight}/><rect x="0" y="0" width="2" height="6" fill={COLORS.goldLight}/>
    <rect x={size-6} y="0" width="6" height="2" fill={COLORS.goldLight}/><rect x={size-2} y="0" width="2" height="6" fill={COLORS.goldLight}/>
    <rect x="0" y={size-2} width="6" height="2" fill={COLORS.goldLight}/><rect x="0" y={size-6} width="2" height="6" fill={COLORS.goldLight}/>
    <rect x={size-6} y={size-2} width="6" height="2" fill={COLORS.goldLight}/><rect x={size-2} y={size-6} width="2" height="6" fill={COLORS.goldLight}/>
    <rect x={size-14} y={size-14} width="14" height="14" rx="2" fill="#8B0000" stroke={COLORS.gold} strokeWidth="1"/>
    <text x={size-7} y={size-4} textAnchor="middle" fill={COLORS.textGold} fontFamily="monospace" fontSize="8" fontWeight="bold">99</text>
    {showHp&&(<><rect x="2" y={size+2} width={size-4} height={6} rx="1" fill="#3A0010" stroke={COLORS.gold} strokeWidth="1"/><rect x="3" y={size+3} width={Math.round((size-6)*hp/100)} height={4} rx="1" fill="#FF3030"/></>)}
  </svg>);
}

function MinimapFrame({size=110,playerX=0,playerY=0,worldW=1024,worldH=1024}) {
  const uid=`mm_${Math.random().toString(36).slice(2,6)}`;
  const half=size/2;
  const px=half+(playerX/worldW-0.5)*(size-16);
  const py=half+(playerY/worldH-0.5)*(size-16);
  return (<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{imageRendering:'pixelated',display:'block'}} xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id={`mmBg_${uid}`} cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor="#0A1830"/><stop offset="100%" stopColor="#050C18"/></radialGradient>
      <clipPath id={`mmClip_${uid}`}><polygon points={`${half},4 ${size-4},${half} ${half},${size-4} 4,${half}`}/></clipPath>
    </defs>
    <polygon points={`${half},0 ${size},${half} ${half},${size} 0,${half}`} fill={COLORS.goldDark} stroke={COLORS.gold} strokeWidth="2"/>
    <polygon points={`${half},4 ${size-4},${half} ${half},${size-4} 4,${half}`} fill={`url(#mmBg_${uid})`}/>
    {[[half-20,half-10],[half-10,half-25],[half+15,half-15],[half+20,half+5],[half+5,half+20],[half-15,half+15]].map(([cx,cy],i)=>(
      <ellipse key={i} cx={cx} cy={cy} rx={6+i%3*3} ry={4+i%2*2} fill={`hsl(${140+i*20},30%,25%)`} clipPath={`url(#mmClip_${uid})`}/>
    ))}
    <polyline points={`${half-20},${half-20} ${half},${half} ${half+15},${half+15}`} stroke="#203060" strokeWidth="3" fill="none" clipPath={`url(#mmClip_${uid})`}/>
    <rect x={half+10} y={half-12} width="4" height="4" fill="#FF4040" opacity="0.8" clipPath={`url(#mmClip_${uid})`}/>
    <rect x={half+5} y={half+12} width="4" height="4" fill="#40FF80" opacity="0.8" clipPath={`url(#mmClip_${uid})`}/>
    <rect x={px-2} y={py-2} width="5" height="5" fill="white" opacity="0.9" clipPath={`url(#mmClip_${uid})`}/>
    <rect x={px-3} y={py-3} width="7" height="7" fill="none" stroke={COLORS.gold} strokeWidth="1" opacity="0.9" clipPath={`url(#mmClip_${uid})`}/>
    <text x={half} y={10} textAnchor="middle" fill={COLORS.gold} fontFamily="monospace" fontSize="7" fontWeight="bold">N</text>
    <text x={half} y={size-2} textAnchor="middle" fill={COLORS.gold} fontFamily="monospace" fontSize="7" fontWeight="bold">S</text>
    <text x={3} y={half+3} textAnchor="start" fill={COLORS.gold} fontFamily="monospace" fontSize="7" fontWeight="bold">W</text>
    <text x={size-3} y={half+3} textAnchor="end" fill={COLORS.gold} fontFamily="monospace" fontSize="7" fontWeight="bold">E</text>
    {[[half,0],[size,half],[half,size],[0,half]].map(([px2,py2],i)=>(
      <rect key={i} x={px2-4} y={py2-4} width="8" height="8" fill={COLORS.gold} transform={`rotate(45,${px2},${py2})`}/>
    ))}
  </svg>);
}

function ItemIcon({type='sword',size=40,rarity=1,count}) {
  const uid=`item_${Math.random().toString(36).slice(2,6)}`;
  const rc=rarity===1?'#808080':rarity===2?'#40A040':rarity===3?'#4080FF':rarity===4?'#A040FF':'#FF8000';
  const rb=rarity===1?'#1A1A1A':rarity===2?'#0A200A':rarity===3?'#0A1030':rarity===4?'#1A0A30':'#301008';
  const cx=size/2,cy=size/2,s=size;
  return (<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{imageRendering:'pixelated',display:'block'}} xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id={`itemBg_${uid}`} cx="50%" cy="50%" r="70%"><stop offset="0%" stopColor={rb}/><stop offset="100%" stopColor="#000000"/></radialGradient></defs>
    <rect x="0" y="0" width={size} height={size} rx="3" fill={`url(#itemBg_${uid})`} stroke={rc} strokeWidth="2"/>
    <rect x="2" y="2" width={size-4} height={size-4} rx="2" fill="none" stroke={rc} strokeWidth="1" opacity="0.4"/>
    {type==='sword'&&<g><polygon points={`${cx},${s*0.1} ${cx+3},${s*0.45} ${cx},${s*0.5} ${cx-3},${s*0.45}`} fill="#C0D8FF" stroke={rc} strokeWidth="1"/><rect x={cx-8} y={s*0.5} width={16} height={4} rx="1" fill={rc}/><rect x={cx-2} y={s*0.54} width={4} height={s*0.3} fill="#8B4513" stroke={rc} strokeWidth="1"/><rect x={cx-4} y={s*0.84} width={8} height={4} rx="2" fill={rc}/></g>}
    {type==='armor'&&<g><path d={`M${cx-10},${s*0.25} L${cx-12},${s*0.3} L${cx-12},${s*0.72} Q${cx},${s*0.82} ${cx+12},${s*0.72} L${cx+12},${s*0.3} L${cx+10},${s*0.25} Z`} fill="#3A4A6A" stroke={rc} strokeWidth="1.5"/><rect x={cx-3} y={s*0.38} width={6} height={s*0.2} rx="2" fill={rc} opacity="0.7"/></g>}
    {type==='ring'&&<g><circle cx={cx} cy={cy} r={s*0.3} fill="none" stroke={rc} strokeWidth="4"/><polygon points={`${cx},${s*0.14} ${cx+5},${s*0.24} ${cx},${s*0.28} ${cx-5},${s*0.24}`} fill={rc}/></g>}
    {type==='pill'&&<g><rect x={cx-7} y={s*0.2} width={14} height={s*0.56} rx="7" fill="#C04020" stroke={rc} strokeWidth="1.5"/><rect x={cx-4} y={s*0.24} width={4} height={s*0.1} rx="2" fill="white" opacity="0.4"/></g>}
    {type==='book'&&<g><rect x={cx-12} y={s*0.2} width={24} height={s*0.6} rx="1" fill="#4A2A0A" stroke={rc} strokeWidth="1.5"/><rect x={cx-10} y={s*0.22} width={20} height={s*0.56} rx="1" fill="#F0E8C0"/><text x={cx+2} y={s*0.5} textAnchor="middle" fill={rc} fontFamily="monospace" fontSize="10" fontWeight="bold" opacity="0.8">文</text></g>}
    {type==='gem'&&<g><polygon points={`${cx},${s*0.15} ${cx+10},${s*0.3} ${cx+10},${s*0.6} ${cx},${s*0.75} ${cx-10},${s*0.6} ${cx-10},${s*0.3}`} fill="#A000C0" stroke={rc} strokeWidth="1.5"/><polygon points={`${cx-2},${s*0.2} ${cx+4},${s*0.28} ${cx+1},${s*0.35} ${cx-4},${s*0.28}`} fill="white" opacity="0.5"/></g>}
    {type==='material'&&<g><polygon points={`${cx},${s*0.18} ${cx+6},${s*0.38} ${cx},${s*0.48} ${cx-6},${s*0.38}`} fill="#40C0A0" stroke={rc} strokeWidth="1"/><rect x={cx-3} y={s*0.48} width={6} height={s*0.24} rx="2" fill="#20604A" stroke={rc} strokeWidth="1"/></g>}
    {count!==undefined&&count>1&&(<><rect x={size-16} y={size-12} width="16" height="12" rx="1" fill="black" opacity="0.8"/><text x={size-8} y={size-3} textAnchor="middle" fill="white" fontFamily="monospace" fontSize="9" fontWeight="bold">{count>99?'99+':count}</text></>)}
    {rarity>=3&&<text x={size/2} y={size-1} textAnchor="middle" fill={rc} fontFamily="monospace" fontSize="6">{'★'.repeat(rarity)}</text>}
  </svg>);
}

function GameButton({width=100,height=30,label='OK',variant='gold',state='normal',onClick}) {
  const uid=`btn_${Math.random().toString(36).slice(2,6)}`;
  const tc=variant==='gold'?(state==='pressed'?'#8B6010':'#E8C050'):variant==='red'?(state==='pressed'?'#600010':'#E04030'):variant==='jade'?(state==='pressed'?'#0A5030':'#30B070'):(state==='pressed'?'#101020':'#2A2A4A');
  const bc=variant==='gold'?(state==='pressed'?'#5A3A00':'#A06810'):variant==='red'?(state==='pressed'?'#400008':'#900010'):variant==='jade'?(state==='pressed'?'#053020':'#107040'):(state==='pressed'?'#080810':'#181828');
  const sc=variant==='gold'?COLORS.goldShine:variant==='red'?'#FF8080':variant==='jade'?'#80FFD0':COLORS.gold;
  const textC=state==='disabled'?'#606060':variant==='gold'?'#1A0800':variant==='jade'?'#003020':'#F0E8D0';
  const op=state==='disabled'?0.5:1;
  return (<svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{imageRendering:'pixelated',display:'block',cursor:state==='disabled'?'not-allowed':'pointer',opacity:op}} onClick={state!=='disabled'?onClick:undefined} xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id={`btnBg_${uid}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={tc}/><stop offset="100%" stopColor={bc}/></linearGradient></defs>
    {state!=='pressed'&&<rect x="2" y="2" width={width} height={height} rx="3" fill="black" opacity="0.4"/>}
    <rect x="0" y={state==='pressed'?2:0} width={width} height={height} rx="3" fill={`url(#btnBg_${uid})`} stroke={sc} strokeWidth="2"/>
    {state!=='pressed'&&<rect x="3" y="2" width={width-6} height={4} rx="2" fill="white" opacity="0.2"/>}
    <text x={width/2} y={height/2+(state==='pressed'?6:5)} textAnchor="middle" fill={textC} fontFamily="'Noto Serif SC',serif" fontSize={height*0.42} fontWeight="bold">{label}</text>
  </svg>);
}

function DamageNumber({value,type='normal',x=0,y=0}) {
  const color=type==='crit'?'#FF8000':type==='miss'?'#A0A0A0':type==='heal'?'#40FF80':'#FF4040';

// TOP-DOWN 2D MAP CANVAS
// ═══════════════════════════════════════════════════════════

// Tile types
const T = { GRASS:0, DIRT:1, STONE:2, WATER:3, DEEP_WATER:4, TREE:5, ROCK:6, FLOWER:7, PATH:8, RUINS:9, LAVA:10, SHRINE:11 };

// Màu tile
const TILE_COLORS = {
  [T.GRASS]:     ['#1A3A12','#1E4214','#224816'],
  [T.DIRT]:      ['#4A3018','#52361C','#3E2810'],
  [T.STONE]:     ['#2A2A34','#303040','#242430'],
  [T.WATER]:     ['#102848','#0E2440','#142C50'],
  [T.DEEP_WATER]:['#080E20','#0A1228','#060C1A'],
  [T.PATH]:      ['#6A5030','#705A38','#60482A'],
  [T.RUINS]:     ['#2A2020','#302428','#241C1C'],
  [T.LAVA]:      ['#4A0800','#500A00','#3E0600'],
  [T.SHRINE]:    ['#2A1A40','#301E48','#241638'],
  [T.FLOWER]:    ['#1E4216','#228018','#1C3C14'],
  [T.TREE]:      ['#0E2808','#102C0A','#0C2406'],
  [T.ROCK]:      ['#282830','#2C2C38','#24242C'],
};

// WORLD_W, WORLD_H, TILE_SIZE loaded from data.js
const COLS = Math.ceil(WORLD_W / TILE_SIZE);
const ROWS = Math.ceil(WORLD_H / TILE_SIZE);

// Sinh map procedurally
function generateMap() {
  const map = [];
  for (let r = 0; r < ROWS; r++) {
    map.push([]);
    for (let c = 0; c < COLS; c++) {
      // Biên là nước
      if (r < 2 || c < 2 || r >= ROWS-2 || c >= COLS-2) { map[r].push(T.DEEP_WATER); continue; }
      if (r < 4 || c < 4 || r >= ROWS-4 || c >= COLS-4) { map[r].push(T.WATER); continue; }

      // Noise đơn giản để tạo địa hình
      const nx = c / COLS, ny = r / ROWS;
      const n1 = Math.sin(nx*13.7 + ny*8.3)*0.5 + Math.sin(nx*6.2 - ny*11.1)*0.3 + Math.sin(nx*23.1 + ny*4.7)*0.2;
      const n2 = Math.sin(nx*5.1 + ny*17.9)*0.5 + Math.sin(nx*9.3 + ny*3.7)*0.5;
      const n  = (n1 + n2) / 2;

      // Khu vực trung tâm: sân bằng
      const dx = (c - COLS/2) / (COLS/2), dy = (r - ROWS/2) / (ROWS/2);
      const dist = Math.sqrt(dx*dx + dy*dy);

      let tile;
      if (dist < 0.12) {
        // Trung tâm: shrine / sân chiến
        tile = (Math.abs(c - Math.round(COLS/2)) < 2 && Math.abs(r - Math.round(ROWS/2)) < 2) ? T.SHRINE : T.PATH;
      } else if (dist < 0.18) {
        tile = T.PATH;
      } else if (n > 0.4) {
        tile = T.TREE;
      } else if (n > 0.25) {
        tile = n > 0.35 ? T.ROCK : T.STONE;
      } else if (n < -0.3) {
        tile = T.WATER;
      } else if (n < -0.15) {
        tile = T.DIRT;
      } else if (Math.random() < 0.04) {
        tile = T.FLOWER;
      } else if (Math.random() < 0.02) {
        tile = T.RUINS;
      } else {
        tile = T.GRASS;
      }

      // Thêm path từ cạnh về trung tâm (4 hướng)
      const midC = Math.round(COLS/2), midR = Math.round(ROWS/2);
      if ((Math.abs(c - midC) < 2 && r > midR - ROWS*0.18 && r < midR) ||
          (Math.abs(c - midC) < 2 && r < midR + ROWS*0.18 && r > midR) ||
          (Math.abs(r - midR) < 2 && c > midC - COLS*0.18 && c < midC) ||
          (Math.abs(r - midR) < 2 && c < midC + COLS*0.18 && c > midC)) {
        tile = T.PATH;
      }

      map[r].push(tile);
    }
  }
  return map;
}

// Các objects trên map (cây, đá — blocking)
function isBlocking(tile) {
  return tile === T.TREE || tile === T.ROCK || tile === T.WATER || tile === T.DEEP_WATER;
}

// NPC/Enemies — loaded from data.js (window.INITIAL_ENTITIES built by data.js)


// ── TOP-DOWN MAP COMPONENT ────────────────────────────────────
function TopDownMap({ bossHp, setBossHp, floats, setFloats, spawnFloat, onNpcClick, showNotif, autoFight, navTarget, onNavConsumed, questIndicators, onMobDeath }) {
  const canvasRef   = useRef(null);
  const mapRef      = useRef(null);
  const stateRef    = useRef({
    player: { x: WORLD_W/2, y: WORLD_H/2 + 160, angle: 0 },
    camera: { x: 0, y: 0 },
    entities: (window.INITIAL_ENTITIES || []).map(e => ({...e})),
    // Joystick
    jsActive: false, jsOrigin: {x:0,y:0}, jsDir: {x:0,y:0},
    // Click-to-move
    moveTarget: null,
    // anim
    tick: 0,
    particles: [],
    processedDeadIds: new Set(),
    floatIdCounter: 200,
    // attack cooldown per entity
    attackTimers: {},
    // walk anim
    walkFrame: 0,
    walkTick: 0,
    // player effects
    playerFlash: 0,
    // canvas size
    vw: 390, vh: 260,
  });
  const joystickRef  = useRef(null);
  const markerRef    = useRef(null);
  const markerPosRef = useRef(null);
  const animRef      = useRef(null);
  const entitiesRef  = useRef(stateRef.current.entities);
  const bossHpRef    = useRef(bossHp);
  useEffect(() => { bossHpRef.current = bossHp; }, [bossHp]);
  const questIndicatorsRef = useRef(questIndicators||{});
  useEffect(() => { questIndicatorsRef.current = questIndicators||{}; }, [questIndicators]);
  const onMobDeathRef = useRef(onMobDeath);
  useEffect(() => { onMobDeathRef.current = onMobDeath; }, [onMobDeath]);

  // External navigation (quest tracker click-to-go)
  useEffect(() => {
    if (!navTarget) return;
    stateRef.current.moveTarget = { x: navTarget.x, y: navTarget.y };
    onNavConsumed && onNavConsumed();
  }, [navTarget, onNavConsumed]);

  // Init map once
  if (!mapRef.current) mapRef.current = generateMap();

  // Draw pixel tile
  const drawTile = useCallback((ctx, tile, px, py, size, tick) => {
    const colors = TILE_COLORS[tile] || TILE_COLORS[T.GRASS];
    const ci = (tick + px + py) % colors.length;
    ctx.fillStyle = colors[ci];
    ctx.fillRect(px, py, size, size);

    // Decoration
    if (tile === T.GRASS) {
      ctx.fillStyle = 'rgba(60,180,40,0.18)';
      ctx.fillRect(px+2, py+2, 4, 4);
    } else if (tile === T.WATER || tile === T.DEEP_WATER) {
      const wOff = Math.sin(tick*0.05 + px*0.1) * 2;
      ctx.fillStyle = 'rgba(80,160,255,0.12)';
      ctx.fillRect(px+4+wOff, py+8, 14, 3);
      ctx.fillRect(px+10-wOff, py+18, 10, 3);
    } else if (tile === T.PATH) {
      ctx.fillStyle = 'rgba(200,160,80,0.15)';
      ctx.fillRect(px+1, py+1, size-2, size-2);
    } else if (tile === T.SHRINE) {
      ctx.fillStyle = 'rgba(200,150,255,0.3)';
      ctx.fillRect(px+8, py+8, 16, 16);
      ctx.fillStyle = '#C8A84B';
      ctx.fillRect(px+14, py+4, 4, 24);
      ctx.fillRect(px+6, py+12, 20, 4);
    } else if (tile === T.FLOWER) {
      ctx.fillStyle = '#FF80C0';
      ctx.fillRect(px+10, py+10, 4, 4);
      ctx.fillStyle = '#FFE040';
      ctx.fillRect(px+18, py+14, 4, 4);
    }
  }, []);

  const drawTree = useCallback((ctx, px, py, size, tick) => {
    // Trunk
    ctx.fillStyle = '#4A2A0A';
    ctx.fillRect(px+12, py+20, 8, 12);
    // Canopy
    const g = ctx.createRadialGradient(px+size/2, py+10, 2, px+size/2, py+10, 14);
    g.addColorStop(0, '#2A6010');
    g.addColorStop(0.6, '#1A4808');
    g.addColorStop(1, '#0E2804');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(px+size/2, py+12, 13, 0, Math.PI*2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(80,220,40,0.18)';
    ctx.beginPath();
    ctx.arc(px+size/2-3, py+8, 6, 0, Math.PI*2);
    ctx.fill();
  }, []);

  const drawRock = useCallback((ctx, px, py) => {
    ctx.fillStyle = '#343448';
    ctx.beginPath();
    ctx.moveTo(px+16, py+4);
    ctx.lineTo(px+28, py+14);
    ctx.lineTo(px+24, py+28);
    ctx.lineTo(px+8,  py+28);
    ctx.lineTo(px+4,  py+16);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(200,200,255,0.15)';
    ctx.beginPath();
    ctx.moveTo(px+16, py+5);
    ctx.lineTo(px+26, py+13);
    ctx.lineTo(px+20, py+8);
    ctx.closePath();
    ctx.fill();
  }, []);

  const drawPlayer = useCallback((ctx, sx, sy, walkFrame, flash) => {
    const wf = Math.floor(walkFrame) % 4;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(sx, sy+14, 10, 4, 0, 0, Math.PI*2); ctx.fill();
    // Robe
    ctx.fillStyle = flash > 0 ? '#FFFFFF' : '#2A3A6A';
    ctx.beginPath();
    ctx.moveTo(sx-8, sy);
    ctx.lineTo(sx-10, sy+14);
    ctx.lineTo(sx, sy+16);
    ctx.lineTo(sx+10, sy+14);
    ctx.lineTo(sx+8, sy);
    ctx.closePath();
    ctx.fill();
    // Leg sway
    if (wf === 0 || wf === 2) {
      ctx.fillStyle = '#1A2A5A';
      ctx.fillRect(sx-5, sy+12, 4, 5);
      ctx.fillRect(sx+1, sy+12, 4, 5);
    } else {
      ctx.fillStyle = '#1A2A5A';
      ctx.fillRect(sx-6, sy+12, 4, 5);
      ctx.fillRect(sx+2, sy+12, 4, 5);
    }
    // Body emblem
    ctx.fillStyle = '#C8A84B';
    ctx.fillRect(sx-2, sy+3, 4, 6);
    // Head
    ctx.fillStyle = flash > 0 ? '#FFFFFF' : '#1C1C2C';
    ctx.beginPath(); ctx.arc(sx, sy-6, 8, 0, Math.PI*2); ctx.fill();
    // Hair bun
    ctx.fillStyle = '#C8A84B';
    ctx.fillRect(sx-2, sy-15, 4, 4);
    ctx.beginPath(); ctx.arc(sx, sy-16, 3, 0, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#FF8080';
    ctx.fillRect(sx-4, sy-7, 3, 2);
    ctx.fillRect(sx+1, sy-7, 3, 2);
    // Sword glow
    ctx.strokeStyle = 'rgba(80,160,255,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx+9, sy+10);
    ctx.lineTo(sx+18, sy-10);
    ctx.stroke();
    ctx.fillStyle = '#80C0FF';
    ctx.fillRect(sx+17, sy-12, 4, 4);
  }, []);

  const drawEntity = useCallback((ctx, e, sx, sy, tick) => {
    if (e.hp <= 0) return;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(sx, sy+e.size, e.size*0.9, e.size*0.35, 0, 0, Math.PI*2); ctx.fill();

    if (e.type === 'boss') {
      // Aura
      const auraR = e.size + 8 + Math.sin(tick*0.05)*3;
      const ag = ctx.createRadialGradient(sx, sy, 2, sx, sy, auraR);
      ag.addColorStop(0, 'rgba(255,0,0,0.25)');
      ag.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = ag;
      ctx.beginPath(); ctx.arc(sx, sy, auraR, 0, Math.PI*2); ctx.fill();
      // Body
      ctx.fillStyle = '#3A0010';
      ctx.beginPath(); ctx.arc(sx, sy, e.size, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#FF2020'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(sx, sy, e.size, 0, Math.PI*2); ctx.stroke();
      // Wings
      ctx.fillStyle = 'rgba(150,0,30,0.7)';
      ctx.beginPath(); ctx.moveTo(sx, sy-8); ctx.lineTo(sx-24, sy-18); ctx.lineTo(sx-18, sy); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(sx, sy-8); ctx.lineTo(sx+24, sy-18); ctx.lineTo(sx+18, sy); ctx.closePath(); ctx.fill();
      // Eyes
      ctx.fillStyle = '#FF4040';
      ctx.fillRect(sx-7, sy-5, 5, 4);
      ctx.fillRect(sx+2, sy-5, 5, 4);
      ctx.fillStyle = '#FFD0D0';
      ctx.fillRect(sx-6, sy-4, 2, 2);
      ctx.fillRect(sx+3, sy-4, 2, 2);
      // Crown
      ctx.fillStyle = '#C8A84B';
      for (let i = -2; i <= 2; i++) ctx.fillRect(sx+i*4-1, sy-e.size-6+Math.abs(i)*2, 2, 6-Math.abs(i)*2);
      // HP bar
      const bw = 50, bh = 4;
      ctx.fillStyle = '#3A0000';
      ctx.fillRect(sx-bw/2, sy-e.size-18, bw, bh);
      ctx.fillStyle = '#FF2020';
      ctx.fillRect(sx-bw/2, sy-e.size-18, bw*(e.hp/e.maxHp), bh);
      ctx.strokeStyle = '#7A0000'; ctx.lineWidth = 1;
      ctx.strokeRect(sx-bw/2, sy-e.size-18, bw, bh);

    } else if (e.type === 'mob') {
      const mt = e.mobType || 'demon';
      // HP bar (shared)
      const bw = 24;
      ctx.fillStyle = '#1A0000';
      ctx.fillRect(sx-bw/2, sy-e.size-9, bw, 3);
      ctx.fillStyle = e.color;
      ctx.fillRect(sx-bw/2, sy-e.size-9, bw*(e.hp/e.maxHp), 3);

      if (mt === 'wolf') {
        // Sói Xám — thân xám, tai nhọn
        ctx.fillStyle = '#707080';
        ctx.beginPath(); ctx.ellipse(sx, sy, e.size, e.size*0.75, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#909090';
        ctx.beginPath(); ctx.moveTo(sx-5, sy-e.size+2); ctx.lineTo(sx-8, sy-e.size-6); ctx.lineTo(sx-1, sy-e.size); ctx.fill();
        ctx.beginPath(); ctx.moveTo(sx+5, sy-e.size+2); ctx.lineTo(sx+8, sy-e.size-6); ctx.lineTo(sx+1, sy-e.size); ctx.fill();
        ctx.fillStyle = '#FF3030'; ctx.fillRect(sx-3, sy-2, 2, 2); ctx.fillRect(sx+1, sy-2, 2, 2);
        ctx.fillStyle = '#FFF'; ctx.fillRect(sx-2, sy+2, 6, 2);

      } else if (mt === 'water_demon') {
        // Thủy Yêu — xanh lam, dạng sóng
        const wob = Math.sin(tick*0.08)*2;
        ctx.fillStyle = '#1040A0';
        ctx.beginPath(); ctx.ellipse(sx, sy+wob, e.size, e.size*0.9, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#40C8FF'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.ellipse(sx, sy+wob, e.size, e.size*0.9, 0, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#80E8FF'; ctx.fillRect(sx-4, sy-3+wob, 3, 3); ctx.fillRect(sx+1, sy-3+wob, 3, 3);
        // Tentacle
        ctx.strokeStyle = '#2080D0'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(sx-e.size, sy+4); ctx.quadraticCurveTo(sx-e.size-8, sy+10+wob, sx-e.size-4, sy+16); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(sx+e.size, sy+4); ctx.quadraticCurveTo(sx+e.size+8, sy+10-wob, sx+e.size+4, sy+16); ctx.stroke();

      } else if (mt === 'white_tiger') {
        // Bạch Hổ — trắng bạc, to hơn
        ctx.fillStyle = '#D0D8E8';
        ctx.beginPath(); ctx.ellipse(sx, sy, e.size*1.1, e.size*0.85, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#8090B0'; ctx.lineWidth = 1;
        // Vằn hổ
        for (let i=-1;i<=1;i++) { ctx.beginPath(); ctx.moveTo(sx+i*5, sy-e.size+2); ctx.lineTo(sx+i*4, sy+e.size-2); ctx.stroke(); }
        // Tai
        ctx.fillStyle = '#E8EEF8';
        ctx.beginPath(); ctx.moveTo(sx-6, sy-e.size+1); ctx.lineTo(sx-10, sy-e.size-7); ctx.lineTo(sx-2, sy-e.size); ctx.fill();
        ctx.beginPath(); ctx.moveTo(sx+6, sy-e.size+1); ctx.lineTo(sx+10, sy-e.size-7); ctx.lineTo(sx+2, sy-e.size); ctx.fill();
        ctx.fillStyle = '#FF6060'; ctx.fillRect(sx-4, sy-2, 3, 3); ctx.fillRect(sx+1, sy-2, 3, 3);

      } else if (mt === 'ruin_beast') {
        // Phế Tích Thú — nâu đất, giáp đá
        ctx.fillStyle = '#5A3A18';
        ctx.beginPath(); ctx.arc(sx, sy, e.size, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#9A7040'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(sx, sy, e.size, 0, Math.PI*2); ctx.stroke();
        // Giáp đá
        ctx.fillStyle = '#8A6030';
        ctx.fillRect(sx-e.size+2, sy-4, 6, 8);
        ctx.fillRect(sx+e.size-8, sy-4, 6, 8);
        ctx.fillStyle = '#C09050'; ctx.fillRect(sx-3, sy-3, 3, 3); ctx.fillRect(sx+1, sy-3, 3, 3);

      } else if (mt === 'fire_spirit') {
        // Hỏa Linh — cam đỏ, aura lửa
        const fp = Math.sin(tick*0.1)*3;
        const fg = ctx.createRadialGradient(sx, sy, 1, sx, sy, e.size+4+fp);
        fg.addColorStop(0, 'rgba(255,160,0,0.6)'); fg.addColorStop(1, 'rgba(255,0,0,0)');
        ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(sx, sy, e.size+4+fp, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FF4000';
        ctx.beginPath(); ctx.arc(sx, sy, e.size, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFD040';
        ctx.beginPath(); ctx.arc(sx, sy, e.size*0.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#FFF'; ctx.fillRect(sx-3, sy-3, 2, 2); ctx.fillRect(sx+1, sy-3, 2, 2);

      } else if (mt === 'dark_soldier') {
        // Hắc Lâm Ác Binh — tím đen, giáp tối
        ctx.fillStyle = '#1A0828';
        ctx.beginPath(); ctx.ellipse(sx, sy, e.size*0.9, e.size, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#8040C0'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.ellipse(sx, sy, e.size*0.9, e.size, 0, 0, Math.PI*2); ctx.stroke();
        // Mũ giáp
        ctx.fillStyle = '#300850';
        ctx.fillRect(sx-e.size+1, sy-e.size-4, (e.size*2)-2, 6);
        // Mắt tím phát sáng
        ctx.fillStyle = '#C060FF'; ctx.fillRect(sx-4, sy-3, 3, 3); ctx.fillRect(sx+1, sy-3, 3, 3);
        // Vũ khí
        ctx.strokeStyle = '#8040C0'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(sx+e.size, sy-e.size); ctx.lineTo(sx+e.size+4, sy+e.size); ctx.stroke();

      } else {
        // Demon / mặc định — Tà Binh
        ctx.fillStyle = '#280008';
        ctx.beginPath(); ctx.arc(sx, sy, e.size, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = e.color; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(sx, sy, e.size, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = e.color;
        ctx.fillRect(sx-4, sy-3, 3, 3); ctx.fillRect(sx+1, sy-3, 3, 3);
      }
      // Tên mob nhỏ
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(sx-22, sy+e.size+2, 44, 10);
      ctx.fillStyle = e.color; ctx.font = '7px monospace'; ctx.textAlign = 'center';
      ctx.fillText(e.name, sx, sy+e.size+10);

    } else if (e.type === 'npc') {
      // Glow
      const ng = ctx.createRadialGradient(sx, sy, 2, sx, sy, e.size+6);
      ng.addColorStop(0, `${e.color}33`);
      ng.addColorStop(1, 'transparent');
      ctx.fillStyle = ng;
      ctx.beginPath(); ctx.arc(sx, sy, e.size+6, 0, Math.PI*2); ctx.fill();
      // Body — màu nền theo màu NPC
      const npcBodyColors = { '#FFD040':'#203060', '#40D0FF':'#1A3020', '#C080FF':'#1A0830' };
      ctx.fillStyle = npcBodyColors[e.color] || '#202040';
      ctx.beginPath(); ctx.arc(sx, sy, e.size, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = e.color; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(sx, sy, e.size, 0, Math.PI*2); ctx.stroke();
      // ! indicator by quest state
      const qi=questIndicatorsRef.current[e.id];
      const qiColor=qi==='done'?'#40FF80':qi==='active'?'#FFD040':qi==='available'?'#FF8040':'rgba(200,168,75,0.5)';
      const qiChar=qi==='done'?'✓':qi==='active'?'?':'!';
      // Bounce animation
      const bounce=Math.sin(tick*0.06)*2;
      // Glow behind indicator
      ctx.fillStyle=qiColor+'44';
      ctx.beginPath(); ctx.arc(sx, sy-e.size-10+bounce, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle=qiColor;
      ctx.font='bold 11px monospace';
      ctx.textAlign='center';
      ctx.fillText(qiChar, sx, sy-e.size-4+bounce);
    }

    // Name tag
    if (e.type !== 'mob') {
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(sx-30, sy+e.size+3, 60, 12);
      ctx.fillStyle = e.type==='boss'?'#FF8080':e.type==='npc'?e.color:'#FF6060';
      ctx.font = '8px "Noto Serif SC", serif';
      ctx.textAlign = 'center';
      ctx.fillText(e.name, sx, sy+e.size+12);
    }
  }, []);

  const drawParticle = useCallback((ctx, p) => {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    if (p.type === 'spark') {
      ctx.shadowColor = p.color; ctx.shadowBlur = 4;
      ctx.fillRect(Math.round(p.x), Math.round(p.y), 2, 2);
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }, []);

  // Main game loop
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const s = stateRef.current;
    const map = mapRef.current;
    const PSPEED = 2.2;
    const TILE = TILE_SIZE;
    let lastTime = 0;

    let resizeTimer = null;
    const applyResize = () => {
      const dpr = window.devicePixelRatio || 1;
      const w   = canvas.offsetWidth  || 390;
      const h   = canvas.offsetHeight || 260;
      // Bỏ qua nếu kích thước không thay đổi (tránh reset canvas thừa)
      if (canvas.width === Math.round(w * dpr) && canvas.height === Math.round(h * dpr)) return;
      canvas.width  = Math.round(w * dpr);
      canvas.height = Math.round(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      s.vw = w;
      s.vh = h;
      s._dpr = dpr;
    };
    // Debounce: chỉ apply sau 120ms im lặng, tránh gọi liên tục khi xoay màn hình
    const resize = () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(applyResize, 120);
    };
    applyResize(); // lần đầu apply ngay
    const ro = new ResizeObserver(resize);
    ro.observe(canvas);

    const spawnParticle = (x, y, color) => {
      for (let i = 0; i < 6; i++) {
        const angle = Math.random()*Math.PI*2;
        const speed = Math.random()*2+0.5;
        s.particles.push({ x, y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed, color, alpha:1, decay:0.04+Math.random()*0.03, type: Math.random()<0.5?'spark':'orb', r:2+Math.random()*2 });
      }
    };

    let vigCache = null, vigW = 0, vigH = 0;

    const loop = (time) => {
      const dt = Math.min(time - lastTime, 50);
      lastTime = time;
      s.tick++;

      const { vw, vh } = s;
      ctx.clearRect(0, 0, vw, vh);

      // ── PLAYER MOVEMENT ──
      const p = s.player;
      let dx = s.jsDir.x, dy = s.jsDir.y;
      const jsMag = Math.sqrt(dx*dx+dy*dy);
      if (jsMag > 0) {
        dx /= jsMag; dy /= jsMag;
      }

      // Click-to-move
      if (s.moveTarget) {
        const tx = s.moveTarget.x - p.x, ty = s.moveTarget.y - p.y;
        const dist = Math.sqrt(tx*tx+ty*ty);
        if (dist < 6) {
          s.moveTarget = null;
        } else {
          const speed = Math.min(dist/6, 1);
          dx = tx/dist * speed;
          dy = ty/dist * speed;
        }
      }

      // Apply movement with collision
      if (dx !== 0 || dy !== 0) {
        const nx = p.x + dx*PSPEED;
        const ny = p.y + dy*PSPEED;
        const tc = Math.floor(nx/TILE), tr = Math.floor(ny/TILE);
        if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS && !isBlocking(map[tr][tc])) {
          p.x = Math.max(32, Math.min(WORLD_W-32, nx));
          p.y = Math.max(32, Math.min(WORLD_H-32, ny));
        }
        // Walk animation
        s.walkTick++;
        if (s.walkTick > 8) { s.walkFrame = (s.walkFrame + 1) % 4; s.walkTick = 0; }
        // Trail particles occasionally
        if (s.tick % 6 === 0) spawnParticle(p.x, p.y+12, '#C8A84B');
      }

      // ── CAMERA ──
      s.camera.x = Math.max(0, Math.min(WORLD_W - vw, p.x - vw/2));
      s.camera.y = Math.max(0, Math.min(WORLD_H - vh, p.y - vh/2));
      const camX = s.camera.x, camY = s.camera.y;

      // ── DRAW MAP TILES ──
      const startC = Math.max(0, Math.floor(camX/TILE));
      const startR = Math.max(0, Math.floor(camY/TILE));
      const endC   = Math.min(COLS, startC + Math.ceil(vw/TILE) + 2);
      const endR   = Math.min(ROWS, startR + Math.ceil(vh/TILE) + 2);

      for (let r = startR; r < endR; r++) {
        for (let c = startC; c < endC; c++) {
          const tile = map[r][c];
          const px = c*TILE - camX, py = r*TILE - camY;
          if (tile === T.TREE) {
            drawTile(ctx, T.GRASS, px, py, TILE, s.tick);
          } else if (tile === T.ROCK) {
            drawTile(ctx, T.STONE, px, py, TILE, s.tick);
          } else {
            drawTile(ctx, tile, px, py, TILE, s.tick);
          }
        }
      }

      // ── DRAW DECORATIONS (trees/rocks on top pass) ──
      for (let r = startR; r < endR; r++) {
        for (let c = startC; c < endC; c++) {
          const tile = map[r][c];
          const px = c*TILE - camX, py = r*TILE - camY;
          if (tile === T.TREE) drawTree(ctx, px, py, TILE, s.tick);
          else if (tile === T.ROCK) drawRock(ctx, px, py);
        }
      }

      // ── MOVE TARGET MARKER ──
      if (s.moveTarget) {
        const mx = s.moveTarget.x - camX, my = s.moveTarget.y - camY;
        const pulse = Math.sin(s.tick*0.15)*3;
        ctx.strokeStyle = 'rgba(200,168,75,0.8)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < 4; i++) {
          const a = i*Math.PI/2 + s.tick*0.03;
          const r1 = 8+pulse, r2 = 14+pulse;
          ctx.moveTo(mx+Math.cos(a)*r1, my+Math.sin(a)*r1);
          ctx.lineTo(mx+Math.cos(a)*r2, my+Math.sin(a)*r2);
        }
        ctx.stroke();
      }

      // ── PARTICLES ──
      for (let i = s.particles.length-1; i >= 0; i--) {
        const pt = s.particles[i];
        pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.04;
        pt.alpha -= pt.decay;
        if (pt.alpha <= 0) { s.particles.splice(i, 1); continue; }
        drawParticle(ctx, { ...pt, x: pt.x-camX, y: pt.y-camY });
      }

      // ── ENTITIES ──
      const entities = s.entities;
      // Detect newly dead mobs → trigger loot + death FX
      for (const e of entities) {
        if (e.hp <= 0 && e.type !== 'npc' && !s.processedDeadIds.has(e.id)) {
          s.processedDeadIds.add(e.id);
          onMobDeathRef.current && onMobDeathRef.current({...e});
          // Death burst particles
          for (let i=0;i<12;i++) {
            const a=Math.random()*Math.PI*2, sp=Math.random()*3+1;
            s.particles.push({x:e.x,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,color:e.color||'#FF6040',alpha:1,decay:0.04,type:'spark',r:3});
          }
        }
      }
      // Remove permanently dead non-NPC entities
      s.entities = entities.filter(e => e.type==='npc' || e.hp > 0);
      for (const e of s.entities) {
        if (e.hp <= 0) continue;
        // Mob AI: patrol slowly
        if (e.type === 'mob' && e.speed > 0) {
          const hx = e.homeX ?? WORLD_W/2;
          const hy = e.homeY ?? WORLD_H/2;
          const phase = s.tick*0.008 + e.id*2.3;
          const orbitR = 55 + (e.id % 7)*12;
          const ox = hx + Math.cos(phase)*orbitR;
          const oy = hy + Math.sin(phase)*orbitR*0.7;
          const mdx = ox-e.x, mdy = oy-e.y;
          const md = Math.sqrt(mdx*mdx+mdy*mdy);
          if (md > 2) { e.x += (mdx/md)*e.speed*0.6; e.y += (mdy/md)*e.speed*0.6; }
          // Attack player if close
          const pdx = p.x-e.x, pdy = p.y-e.y;
          const pd = Math.sqrt(pdx*pdx+pdy*pdy);
          if (pd < 40 && s.tick % 120 === e.id % 120) {
            spawnParticle(e.x, e.y, '#FF4040');
          }
        }
        const sx = e.x - camX, sy = e.y - camY;
        if (sx > -60 && sx < vw+60 && sy > -60 && sy < vh+60) {
          drawEntity(ctx, e, sx, sy, s.tick);
        }
      }

      // ── PLAYER ──
      const psx = p.x - camX, psy = p.y - camY;
      if (s.playerFlash > 0) s.playerFlash--;
      drawPlayer(ctx, psx, psy, s.walkFrame, s.playerFlash);

      // ── WATER shimmer overlay ──
      ctx.fillStyle = 'rgba(80,140,255,0.03)';
      ctx.fillRect(0, 0, vw, vh);

      // ── VIGNETTE (cached gradient, chỉ tạo lại khi kích thước thay đổi) ──
      if (!vigCache || vigW !== vw || vigH !== vh) {
        vigW = vw; vigH = vh;
        vigCache = ctx.createRadialGradient(vw/2, vh/2, vh*0.3, vw/2, vh/2, vh*0.85);
        vigCache.addColorStop(0, 'transparent');
        vigCache.addColorStop(1, 'rgba(0,0,0,0.55)');
      }
      ctx.fillStyle = vigCache;
      ctx.fillRect(0, 0, vw, vh);

      // ── COORD HINT ──
      ctx.fillStyle = 'rgba(200,168,75,0.3)';
      ctx.font = '8px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(`${Math.round(p.x)},${Math.round(p.y)}`, 4, vh-4);

      animRef.current = requestAnimationFrame(loop);
    };

    animRef.current = requestAnimationFrame(loop);
    return () => {
      cancelAnimationFrame(animRef.current);
      clearTimeout(resizeTimer);
      ro.disconnect();
    };
  }, [drawTile, drawTree, drawRock, drawPlayer, drawEntity, drawParticle]);

  // Joystick handlers
  const jsStartHandler = useCallback((e) => {
    e.preventDefault();
    const base = joystickRef.current;
    if (!base) return;
    const rect = base.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    const pt = e.touches ? e.touches[0] : e;
    stateRef.current.jsActive = true;
    stateRef.current.jsOrigin = { x: cx, y: cy };
    stateRef.current.moveTarget = null;
  }, []);

  const jsMoveHandler = useCallback((e) => {
    e.preventDefault();
    if (!stateRef.current.jsActive) return;
    const pt = e.touches ? e.touches[0] : e;
    const { jsOrigin } = stateRef.current;
    const vdx = pt.clientX - jsOrigin.x, vdy = pt.clientY - jsOrigin.y;
    const dist = Math.sqrt(vdx*vdx+vdy*vdy);
    const maxR = 26;
    const clamp = Math.min(dist, maxR);
    const ratio = dist > 0 ? clamp/dist : 0;
    // Thumb di chuyển theo viewport (visual feedback đúng)
    const thumb = joystickRef.current?.querySelector('.joystick-thumb');
    if (thumb) { thumb.style.transform = `translate(calc(-50% + ${vdx*ratio}px), calc(-50% + ${vdy*ratio}px)`; }
    // Không còn rotate-trick: tọa độ viewport khớp trực tiếp với game
    stateRef.current.jsDir = { x: vdx/Math.max(dist,1), y: vdy/Math.max(dist,1) };
  }, []);

  const jsEndHandler = useCallback((e) => {
    e.preventDefault();
    stateRef.current.jsActive = false;
    stateRef.current.jsDir = { x:0, y:0 };
    const thumb = joystickRef.current?.querySelector('.joystick-thumb');
    if (thumb) thumb.style.transform = 'translate(-50%, -50%)';
  }, []);

  // Click-to-move + attack
  const handleCanvasClick = useCallback((e) => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    // Tọa độ click thẳng vào canvas, không cần bù rotate
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const s = stateRef.current;
    const worldX = cx + s.camera.x, worldY = cy + s.camera.y;

    // Check if clicked on enemy
    let hit = false;
    for (const ent of s.entities) {
      if (ent.hp <= 0) continue;
      const dx = worldX - ent.x, dy = worldY - ent.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < ent.size + 10) {
        // Attack entity
        const dmg = Math.random() < 0.3 ? Math.floor(Math.random()*15000+8000) : Math.floor(Math.random()*8000+2000);
        const isCrit = dmg > 12000;
        // Damage to entity
        ent.hp = Math.max(0, ent.hp - dmg);
        if (ent.type === 'boss') setBossHp(ent.hp);
        // Floating number
        spawnFloat(cx - 40, cy - 20, isCrit ? 'crit' : 'normal');
        // Particles
        for (let i = 0; i < 5; i++) {
          const a = Math.random()*Math.PI*2, sp = Math.random()*3+1;
          s.particles.push({ x:ent.x, y:ent.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, color:'#FF6040', alpha:1, decay:0.06, type:'spark', r:2 });
        }
        // Flash player
        if (ent.type === 'npc') {
          onNpcClick && onNpcClick(ent);
        }
        hit = true;
        break;
      }
    }

    if (!hit) {
      // Click-to-move
      const tileC = Math.floor(worldX/TILE_SIZE), tileR = Math.floor(worldY/TILE_SIZE);
      if (tileR >= 0 && tileR < ROWS && tileC >= 0 && tileC < COLS && !isBlocking(mapRef.current[tileR][tileC])) {
        s.moveTarget = { x: worldX, y: worldY };
      }
    }
  }, [setBossHp, spawnFloat, onNpcClick]);

  // Auto-fight: periodically attack nearest enemy
  useEffect(() => {
    if (!autoFight) return;
    const t = setInterval(() => {
      const s = stateRef.current;
      const p = s.player;
      let nearest = null, nearDist = Infinity;
      for (const e of s.entities) {
        if (e.hp <= 0 || e.type === 'npc') continue;
        const dx = p.x-e.x, dy = p.y-e.y;
        const d = Math.sqrt(dx*dx+dy*dy);
        if (d < nearDist) { nearDist = d; nearest = e; }
      }
      if (!nearest) return;
      // Move toward
      const dx = nearest.x-p.x, dy = nearest.y-p.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d > 80) { s.moveTarget = { x: nearest.x - (dx/d)*50, y: nearest.y - (dy/d)*50 }; }
      else {
        const dmg = Math.random()<0.35 ? Math.floor(Math.random()*15000+8000) : Math.floor(Math.random()*8000+2000);
        nearest.hp = Math.max(0, nearest.hp - dmg);
        if (nearest.type === 'boss') setBossHp(nearest.hp);
        const sx = nearest.x - s.camera.x, sy = nearest.y - s.camera.y;
        spawnFloat(sx-40, sy-20, dmg>12000?'crit':'normal');
        for (let i=0;i<4;i++) { const a=Math.random()*Math.PI*2,sp=Math.random()*2+1; s.particles.push({x:nearest.x,y:nearest.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,color:'#FF6040',alpha:1,decay:0.07,type:'spark',r:2}); }
      }
    }, 1200);
    return () => clearInterval(t);
  }, [autoFight, setBossHp, spawnFloat]);

  const player = stateRef.current.player;

  return (
    <div style={{ position:'relative', width:'100%', height:'100%' }}>
      <canvas
        ref={canvasRef}
        className="game-world-canvas"
        onClick={handleCanvasClick}
        style={{ cursor:'crosshair' }}
      />

      {/* Joystick */}
      <div className="joystick-wrap" ref={joystickRef}>
        <div
          className="joystick-base"
          onMouseDown={jsStartHandler}
          onMouseMove={jsMoveHandler}
          onMouseUp={jsEndHandler}
          onMouseLeave={jsEndHandler}
          onTouchStart={jsStartHandler}
          onTouchMove={jsMoveHandler}
          onTouchEnd={jsEndHandler}
        >
          <div className="joystick-thumb" />
        </div>
      </div>

      {/* Floating damage */}
      {floats.map(f => (
        <DamageNumber key={f.id} value={f.value} type={f.type} x={f.x} y={f.y} />
      ))}

      {/* Hint */}
      <div style={{ position:'absolute', bottom:8, right:8, fontSize:9, color:'rgba(200,168,75,0.4)', pointerEvents:'none', textAlign:'right', letterSpacing:1 }}>
        Joystick / Click di chuyển<br/>Click quái để tấn công
      </div>
    </div>
  );
}
