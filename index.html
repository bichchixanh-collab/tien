function App() {
  const [showChar,     setShowChar]    = useState(false);
  const [showInv,      setShowInv]     = useState(false);
  const [showSkill,    setShowSkill]   = useState(false);
  const [showQuest,    setShowQuest]   = useState(false);
  const [showDialogue, setShowDialogue]= useState(false);
  const [showChat,     setShowChat]    = useState(false);
  const [showShop,     setShowShop]    = useState(false);
  const [showGuild,    setShowGuild]   = useState(false);
  const [showEquip,    setShowEquip]   = useState(false);
  const [equip,        setEquip]       = useState(DEFAULT_EQUIP);
  const [invItems,     setInvItems]    = useState(INVENTORY_ITEMS);
  const [gold,         setGold]        = useState(2480000);
  const [trackerCollapsed, setTrackerCollapsed] = useState(false);
  const [quests,       setQuests]      = useState(QUESTS);
  const [skillLevels,  setSkillLevels] = useState([10,8,7,6,9,5,4,3]);
  const [skillPoints,  setSkillPoints] = useState(5);
  const [trackedQuest, setTrackedQuest]= useState(1);
  const [hp,  setHp]  = useState(82);
  const [mp,  setMp]  = useState(65);
  const [exp, setExp] = useState(68);
  const [bossHp, setBossHp]     = useState(234500);
  const [floats, setFloats]     = useState([]);
  const [skillCDs, setSkillCDs] = useState([0, 0, 0, 0, 0, 0, 0, 0]);
  const [activeSkill, setActiveSkill] = useState(null);
  const [chatMessages, setChatMessages] = useState(INITIAL_CHAT);
  const [notifText, setNotifText] = useState(null);
  const [autoFight, setAutoFight]   = useState(false);
  const floatIdRef  = useRef(0);
  const chatIdRef   = useRef(100);
  const gameAreaRef = useRef(null);
  // ✅ FIX: ref để đọc skillCDs mới nhất bên trong interval mà không cần stale closure
  const skillCDsRef = useRef(skillCDs);
  useEffect(() => { skillCDsRef.current = skillCDs; }, [skillCDs]);

  const showNotif = useCallback((text) => {
    setNotifText(text);
    setTimeout(() => setNotifText(null), 3000);
  }, []);

  // ✅ DamageNumber dùng x/y props trực tiếp — không cần wrapper div
  const spawnFloat = useCallback((x, y, type='normal') => {
    const value = type==='heal'
      ? Math.floor(Math.random()*3000+500)
      : Math.floor(Math.random()*8000+1000);
    const id = floatIdRef.current++;
    setFloats(f => [...f, { id, x, y, value, type }]);
    setTimeout(() => setFloats(f => f.filter(ft => ft.id!==id)), 1800);
  }, []);

  const handleGameClick = useCallback((e) => {
    const rect = gameAreaRef.current?.getBoundingClientRect();
    if (!rect) return;
    const x = e.clientX - rect.left - 40;
    const y = e.clientY - rect.top  - 20;
    const roll = Math.random();
    const type  = roll < 0.15 ? 'crit' : roll < 0.25 ? 'miss' : 'normal';
    spawnFloat(x, y, type);
    if (type!=='miss') setBossHp(h => Math.max(0, h-(type==='crit'?15000:5000)));
  }, [spawnFloat]);

  // ✅ FIX: đặt CD = 1 ngay lập tức trước khi khởi động interval
  //         → tránh race condition khi auto-fight thấy CD vẫn là 0
  const triggerSkill = useCallback((i) => {
    const rect = gameAreaRef.current?.getBoundingClientRect();
    const x = rect ? Math.random()*(rect.width-120)+20 : 100;
    const y = rect ? Math.random()*(rect.height*0.6)+20 : 80;
    const isCrit = Math.random() < 0.35;
    spawnFloat(x, y, isCrit?'crit':'normal');
    setBossHp(h => Math.max(0, h-(isCrit?18000:9000)));
    setActiveSkill(i);
    setTimeout(() => setActiveSkill(null), 300);

    const cdTime = SKILLS[i].baseCd;
    if (cdTime > 0) {
      // Đặt CD = 1 (full) ngay lập tức
      setSkillCDs(cds => { const n=[...cds]; n[i]=1; return n; });
      const steps = 60;
      let elapsed = 0;
      const iv = setInterval(() => {
        elapsed++;
        setSkillCDs(cds => { const n=[...cds]; n[i]=Math.max(0, 1-elapsed/steps); return n; });
        if (elapsed >= steps) clearInterval(iv);
      }, (cdTime*1000)/steps);
    }
  }, [spawnFloat]);

  const handleSkillClick = useCallback((i) => {
    if (skillCDs[i] > 0) return;
    triggerSkill(i);
    showNotif(`Dùng kỹ năng: ${SKILLS[i].name}`);
  }, [skillCDs, triggerSkill, showNotif]);

  // HP/MP hồi phục
  useEffect(() => {
    const t = setInterval(() => {
      setHp(h => Math.min(100, h+0.4));
      setMp(m => Math.min(100, m+0.8));
      setExp(e => Math.min(100, e+0.08));
    }, 2000);
    return () => clearInterval(t);
  }, []);

  // Đồng hồ
  useEffect(() => {
    const update = () => {
      const el = document.getElementById('game-time');
      if (el) el.textContent = new Date().toLocaleTimeString('vi-VN', { hour12:false });
    };
    update();
    const t = setInterval(update, 1000);
    return () => clearInterval(t);
  }, []);

  // Boss tấn công người chơi
  useEffect(() => {
    const t = setInterval(() => {
      const rect = gameAreaRef.current?.getBoundingClientRect();
      const x = rect ? Math.random()*(rect.width*0.45) : 50;
      const y = 30+Math.random()*60;
      spawnFloat(x, y, Math.random()<0.2?'crit':'normal');
      setHp(h => Math.max(5, h-(Math.random()*8+2)));
      setMp(m => Math.max(0, m-(Math.random()*3+1)));
    }, 3200);
    return () => clearInterval(t);
  }, [spawnFloat]);

  // Chat tự động
  useEffect(() => {
    const msgs = [
      { name:'Kiếm Ma',          text:'Một kiếm phá ma!',               color:'#C880FF' },
      { name:'Thiên Kiếm Khách', text:'Cố lên!',                        color:'#80D0FF' },
      { name:'Lăng Tiêu Tiên',   text:'Trị liệu ra, cứ xông đi!',       color:'#80FF80' },
      { name:'Hệ Thống',         text:'Nguyên Soái vào trạng thái điên cuồng!', color:'#FF4040' },
      { name:'Thanh Vân Tử',     text:'Đừng sợ, tiếp tục!',             color:'#FFD060' },
    ];
    let idx = 0;
    const t = setInterval(() => {
      const m = msgs[idx++%msgs.length];
      const id = chatIdRef.current++;
      setChatMessages(prev => [...prev.slice(-8), { ...m, id }]);
    }, 4000);
    return () => clearInterval(t);
  }, []);

  // ✅ FIX: auto-fight đọc CD từ ref (không stale) và không gọi triggerSkill
  //         bên trong state updater → tránh side effect trong pure function
  useEffect(() => {
    if (!autoFight) return;
    const t = setInterval(() => {
      const currentCDs = skillCDsRef.current;
      const available = SKILLS.map((_,i) => i).filter(i => currentCDs[i]===0);
      if (available.length===0) return;
      const idx = available[Math.floor(Math.random()*available.length)];
      triggerSkill(idx);
    }, 1500);
    return () => clearInterval(t);
  }, [autoFight, triggerSkill]);

  const handleSendChat = useCallback((text) => {
    const id = chatIdRef.current++;
    setChatMessages(prev => [...prev.slice(-8), { id, name:'Thanh Vân Tử', text, color:'#FFD060' }]);
  }, []);

  const sysBtns = [
    { label:'Nhân Vật', icon:'👤', action:() => setShowChar(true)  },
    { label:'Trang Bị', icon:'⚔️', action:() => setShowEquip(true) },

    { name:'Trúng Độc',    color:'#80FF20', time:'0:08' },
  ];

  const stars = [
    [22,12],[55,8],[92,28],[128,6],[165,15],[198,4],[228,20],[268,10],
    [302,26],[338,7],[368,18],[14,42],[78,46],[148,38],[248,32],[352,44],
    [42,58],[108,62],[178,52],[288,56],[354,68],[50,22],[180,30],[310,18],
    [74,74],[200,68],[326,80],[18,80],[240,75],
  ];

  return (
    <div className="game-root">
      <div className="game-bg">
        <div className="bg-layer-sky" />
        <div className="bg-layer-mist" />
        <div className="bg-layer-mountains" />
        <div className="bg-layer-ground" />

      <div className="cloud-deco cloud-2"><CloudDecoration width={160} color="#9090B0" /></div>
      <div className="cloud-deco cloud-3"><CloudDecoration width={120} color="#7080A0" /></div>

      {notifText && (
        <div className="sys-notif"><span className="notif-icon">⚡</span>{notifText}</div>
      )}

      {/* HUD trên */}
      <div className="hud-top">
        <div className="hud-player-block">
          <div className="hud-avatar" onClick={() => setShowChar(true)}>
            <AvatarFrame size={54} hp={hp} showHp={true} />
          </div>
          <div className="hud-bars">
            {[
              { label:'Khí', cls:'hp-icon',  val:hp,  type:'hp'  },
              { label:'Linh',cls:'mp-icon',  val:mp,  type:'mp'  },
              { label:'Ngộ', cls:'exp-icon', val:exp, type:'exp' },

          preserveAspectRatio="xMidYMid slice"
          style={{ position:'absolute', top:0, left:0, imageRendering:'pixelated' }}>
          <defs>
            <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor="#030610" /><stop offset="40%"  stopColor="#060820" /><stop offset="100%" stopColor="#080C28" />
            </linearGradient>
            <linearGradient id="mtFarGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor="#0E1A28" /><stop offset="100%" stopColor="#060C18" />
            </linearGradient>
            <linearGradient id="mtNearGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor="#080E1A" /><stop offset="100%" stopColor="#040810" />
            </linearGradient>
            <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor="#081220" /><stop offset="100%" stopColor="#040810" />
            </linearGradient>
            <radialGradient id="moonGlow" cx="76%" cy="16%" r="28%">
              <stop offset="0%"   stopColor="#A0C0F0" stopOpacity="0.2" />
              <stop offset="100%" stopColor="transparent" stopOpacity="0" />
            </radialGradient>
            <radialGradient id="enemyAura" cx="50%" cy="50%" r="50%">
              <stop offset="0%"   stopColor="#FF0000" stopOpacity="0.12" />
              <stop offset="100%" stopColor="transparent" stopOpacity="0" />
            </radialGradient>
            <filter id="enemyGlow">
              <feGaussianBlur stdDeviation="1.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <rect width="390" height="300" fill="url(#skyGrad)" />
          <rect width="390" height="300" fill="url(#moonGlow)" />
          {stars.map(([x,y],i) => (
            <rect key={i} x={x} y={y} width={i%4===0?2:1} height={i%4===0?2:1}
              fill="white" opacity={0.25+(i%5)*0.12} />
          ))}
          <circle cx="297" cy="36" r="20" fill="#DDE8FF" opacity="0.88" />
          <circle cx="303" cy="30" r="18" fill="#06082A" opacity="0.55" />
          <polygon points="0,165 35,88 70,128 110,72 152,112 196,62 238,102 278,56 318,96 358,64 390,88 390,185 0,185" fill="url(#mtFarGrad)" />
          <polygon points="35,88 45,108 25,108"   fill="#C0CDE8" opacity="0.15" />
          <polygon points="196,62 206,82 186,82"  fill="#C0CDE8" opacity="0.15" />
          <polygon points="278,56 288,76 268,76"  fill="#C0CDE8" opacity="0.15" />
          <polygon points="0,205 45,138 84,168 136,118 186,155 238,108 285,148 336,112 390,142 390,225 0,225" fill="url(#mtNearGrad)" />
          <rect x="0" y="220" width="390" height="80" fill="url(#groundGrad)" />
          {[18,50,90,130,170,210,250,290,330,365].map((x,i) => (
            <rect key={i} x={x} y={222} width={2} height={4+(i%3)*3} fill="#1A2A38" opacity="0.5" />
          ))}
          <ellipse cx="195" cy="225" rx="80" ry="8" fill="#200040" opacity="0.2" />
          <g transform="translate(200,192)" filter="url(#enemyGlow)">
            <circle cx="0" cy="-22" r="26" fill="url(#enemyAura)" />
            <polygon points="-14,-38 -44,-14 -36,-2 -14,-22" fill="#280010" stroke="#500020" strokeWidth="0.5" />
            <polygon points="14,-38 44,-14 36,-2 14,-22"  fill="#280010" stroke="#500020" strokeWidth="0.5" />
            <rect x="-13" y="-42" width="26" height="36" rx="3" fill="#3A0010" stroke="#700020" strokeWidth="0.8" />
            <rect x="-10" y="-40" width="20" height="8"  rx="1" fill="#500020" />
            <rect x="-8"  y="-30" width="16" height="22" rx="2" fill="#450018" />
            <rect x="-9"  y="-58" width="18" height="17" rx="2" fill="#3A0010" stroke="#600020" strokeWidth="0.8" />
            <polygon points="-7,-57 -13,-74 -3,-59" fill="#700020" />
            <polygon points="7,-57 13,-74 3,-59"   fill="#700020" />
            <rect x="-6" y="-52" width="4" height="4" fill="#FF2020" />
            <rect x="2"  y="-52" width="4" height="4" fill="#FF2020" />
            <rect x="-5" y="-51" width="2" height="2" fill="#FFA0A0" opacity="0.7" />
            <rect x="3"  y="-51" width="2" height="2" fill="#FFA0A0" opacity="0.7" />
            <line x1="14" y1="-20" x2="28" y2="-48" stroke="#8040A0" strokeWidth="3" />
            <rect x="11" y="-22"  width="8" height="2" fill="#6030C0" />
          </g>
          <g transform="translate(100,204)">
            <polygon points="-8,-36 -20,-8 -10,-10" fill="#3040C0" opacity="0.8" />
            <rect x="-8" y="-40" width="16" height="30" rx="2" fill="#2030A0" stroke="#4050D0" strokeWidth="0.8" />
            <rect x="-6" y="-38" width="12" height="6"  rx="1" fill="#3040C0" />
            <rect x="-4" y="-30" width="8"  height="18" rx="1" fill="#2838A8" />
            <rect x="-5" y="-52" width="10" height="13" rx="2" fill="#2030A0" stroke="#4050D0" strokeWidth="0.8" />
            <rect x="-5" y="-55" width="10" height="4"  rx="1" fill="#101888" />
            <line x1="9" y1="-30" x2="24" y2="-52" stroke="#A0D0FF" strokeWidth="2.5" />
            <rect x="6" y="-32"  width="8" height="2" fill="#C0A020" />
            <circle cx="9" cy="-30" r="2" fill="#FFD040" />
          </g>
        </svg>
        <ParticleCanvas />
        <div className="world-hint">Nhấn vào chiến trường để tấn công</div>
        {/* ✅ DamageNumber dùng x/y props trực tiếp — có animation tích hợp sẵn */}
        {floats.map(f => (
          <DamageNumber key={f.id} value={f.value} type={f.type} x={f.x} y={f.y} />
        ))}
      </div>

      {/* Theo dõi nhiệm vụ */}
      <div className="quest-tracker">
        <div className="tracker-title" style={{ position:'relative' }}>
          <button className="tracker-toggle" onClick={() => setTrackerCollapsed(c => !c)}
            title={trackerCollapsed?'Hiện':'Ẩn'}>
            {trackerCollapsed ? '▶' : '▼'}
          </button>
          <Ornament width={120} height={12} color={COLORS.gold} />
          <div className="tracker-head">Theo Dõi Nhiệm Vụ</div>
          <Ornament width={120} height={12} color={COLORS.gold} />
        </div>
        <div className={`tracker-body${trackerCollapsed?' collapsed':''}`} style={{ maxHeight:200 }}>
          {quests.map(q => (
            <div key={q.id} className="tracker-quest"
              style={{ opacity: trackedQuest===q.id ? 1 : 0.6 }}>
              <div className="tracker-qname">
                <span className={q.done?'tq-done':'tq-active'}>{q.done?'✓':'►'}</span>
                {trackedQuest===q.id && <span style={{ color:'#40FF80', fontSize:7 }}>★</span>}
                {q.name}
              </div>
              <div className="tracker-prog">{q.progress}/{q.total}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Menu hệ thống */}
      <div className="sys-menu">
        {sysBtns.map((btn, i) => (
          <button key={i} className="sys-btn" onClick={btn.action}>
            <span className="sys-icon">{btn.icon}</span>
            <span className="sys-label">{btn.label}</span>
          </button>
        ))}
      </div>

      {/* Chat */}
      {showChat ? (
        <ChatBox messages={chatMessages} onClose={() => setShowChat(false)} onSend={handleSendChat} />
      ) : (
        <div className="chat-bubble" onClick={() => setShowChat(true)}>
          <div className="chat-last-msg">
            <span className="chat-name" style={{ color:chatMessages[chatMessages.length-1]?.color }}>
              [{chatMessages[chatMessages.length-1]?.name}]
            </span>
            <span className="chat-text-snip">{chatMessages[chatMessages.length-1]?.text}</span>
          </div>
        </div>
      )}

      {/* Thanh kỹ năng */}
      <div className="skill-bar-wrap">
        <div className="skill-bar-bg" />
        <div className="skill-bar">
          <div className="skill-aux-btns">
            <button className="aux-btn" onClick={() => {
              const rect = gameAreaRef.current?.getBoundingClientRect();
			  
			  
              spawnFloat(Math.random()*80+20, rect?rect.height*0.4:80, 'heal');
              setHp(h => Math.min(100, h+20));
              setMp(m => Math.max(0, m-30));
              showNotif('Dùng Đại Hoàn Đan, hồi phục khí huyết');
            }}>
              <span>Khí</span><span className="aux-label">Hồi Máu</span>
            </button>
            <button className="aux-btn aux-blue" onClick={() => {
              setMp(m => Math.min(100, m+40));
              showNotif('Dùng Hồi Linh Đan, hồi phục linh lực');
            }}>
              <span>Linh</span><span className="aux-label">Hồi Linh</span>
            </button>
          </div>

          {/* ✅ 8 ô kỹ năng kích thước nhỏ hơn — vừa màn hình */}
          <div className="skill-slots">
            {SKILLS.map((sk, i) => (
              <div key={i}
                className={`skill-slot ${activeSkill===i?'skill-slot-active':''}`}
                onClick={() => handleSkillClick(i)}>
                <SkillButton size={38} cooldown={skillCDs[i]} baseCd={sk.baseCd||1} keyLabel={sk.key}
                  active={activeSkill===i} icon={<SkillIcon type={sk.type} size={22} />} />
                <div className="skill-name-label">{sk.name}</div>
              </div>
            ))}
          </div>

          <div className="auto-attack-wrap">
            <button className="auto-btn" onClick={() => setShowDialogue(true)}>
              <span className="auto-icon">💬</span>
              <span className="auto-label">Đối Thoại</span>
            </button>
            {/* ✅ Tự động chiến đấu thực sự — toggle + useEffect với interval */}
            <button className={`auto-btn auto-red ${autoFight?'auto-active':''}`}
              onClick={() => {
                setAutoFight(f => !f);
                showNotif(autoFight?'Tự động chiến đấu đã TẮT':'Tự động chiến đấu đã BẬT');
              }}>
              <span className="auto-icon">⚔</span>
              <span className="auto-label">{autoFight?'Dừng':'Tự Động'}</span>
            </button>
          </div>
        </div>
        <div className="bar-ornament">
          <Ornament width={340} height={10} color={COLORS.gold} />
        </div>
      </div>

      {/* Info bar */}
      <div className="hud-info-bar">
        <span className="info-server">Khu Bích Lạc-1</span>
        <span className="info-sep">·</span>
        <span className="info-zone">Thanh Vân Sơn</span>
        <span className="info-sep">·</span>
        <span className="info-time" id="game-time">21:43:27</span>
        <span className="info-sep">·</span>
        <span className="info-fps">60 FPS</span>
      </div>

      {showChar     && <CharacterPanel onClose={() => setShowChar(false)} onEquip={() => setShowEquip(true)} />}
      {showInv      && <InventoryPanel onClose={() => setShowInv(false)} invItems={invItems} setInvItems={setInvItems} gold={gold} setGold={setGold} equip={equip} setEquip={setEquip} showNotif={showNotif} setHp={setHp} setMp={setMp} />}
      {showSkill    && <SkillPanel     onClose={() => setShowSkill(false)} skillLevels={skillLevels} setSkillLevels={setSkillLevels} skillPoints={skillPoints} setSkillPoints={setSkillPoints} showNotif={showNotif} />}
      {showQuest    && <QuestPanel     onClose={() => setShowQuest(false)} quests={quests} setQuests={setQuests} gold={gold} setGold={setGold} showNotif={showNotif} trackedQuest={trackedQuest} setTrackedQuest={setTrackedQuest} />}
      {showShop     && <ShopPanel      onClose={() => setShowShop(false)} showNotif={showNotif} gold={gold} setGold={setGold} />}
      {showGuild    && <GuildPanel     onClose={() => setShowGuild(false)} gold={gold} setGold={setGold} showNotif={showNotif} />}
      {showEquip    && <EquipmentPanel onClose={() => setShowEquip(false)} equip={equip} setEquip={setEquip} showNotif={showNotif} />}
      {showDialogue && <DialogueBox    onClose={() => setShowDialogue(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
